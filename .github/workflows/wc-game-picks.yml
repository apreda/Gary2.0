name: World Cup Game Picks

# Cloud pick generation for the 2026 FIFA World Cup (laptop-independent). Runs the SAME
# script the laptop uses — node scripts/run-agentic-picks.js --wc — on GitHub's runners.
# WC ships two plays per match (side + total) from one run; the pick logic is untouched.
#
# Needs API_FOOTBALL_KEY in addition to the usual secrets — that's the recent-international
# form data (api-sports.io) wired into the WC scout report + tape. Without it the run still
# works but WC picks are thinner (form/xG rows drop); add it as a repo secret for full
# quality.
#
# MANUAL by design (matches the other pick workflows): schedule left commented — the laptop
# scheduler picks each match at T-90 with the freshest data; an always-on cron could lock in
# a staler pick first (picks dedup per game). Trigger as a backstop, or uncomment to automate.
on:
  # schedule:
  #   - cron: '0 13 * * *'   # ~9 AM ET — only enable for fully automatic cloud picks
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max matches to analyze (0 = all)'
        required: false
        default: '0'
      force:
        description: 'Force re-run existing picks'
        required: false
        default: 'false'

env:
  TZ: America/New_York

concurrency:
  group: wc-game-picks
  cancel-in-progress: false

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 200

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: gary2.0/package-lock.json

      - name: Install dependencies
        working-directory: gary2.0
        run: npm ci --legacy-peer-deps

      - name: Generate World Cup Game Picks
        working-directory: gary2.0
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          ARGS="--wc"
          if [ "${{ github.event.inputs.limit }}" != "0" ] && [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.force }}" == "true" ]; then
            ARGS="$ARGS --force"
          fi
          echo "Running: node scripts/run-agentic-picks.js $ARGS"
          node scripts/run-agentic-picks.js $ARGS

      - name: Summary
        if: always()
        run: echo "World Cup Game Picks completed at $(date)"
