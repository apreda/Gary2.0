name: Daily Props Generation

# Runs at 7am EST (12:00 UTC standard time)
# Same time as game picks - runs in parallel
on:
  schedule:
    - cron: '0 12 * * *'  # 7am EST (standard time)
  workflow_dispatch:  # Allow manual trigger
    inputs:
      sports:
        description: 'Sports to run (comma-separated: nba,nhl,nfl or all)'
        required: false
        default: 'all'

jobs:
  generate-props:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # GitHub max is 360 min (6 hrs)

    defaults:
      run:
        working-directory: gary2.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gary2.0/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Determine which sports to run based on day of week
      - name: Determine sports to run
        id: sports
        run: |
          DAY_OF_WEEK=$(date +%u)  # 1=Monday, 7=Sunday

          # Manual override if specified
          if [ "${{ github.event.inputs.sports }}" != "" ] && [ "${{ github.event.inputs.sports }}" != "all" ]; then
            echo "sports=${{ github.event.inputs.sports }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          SPORTS="nba,nhl"

          # Add NFL on Thursday (4), Saturday (6), Sunday (7), Monday (1)
          # Saturday included for playoff weekends (Wild Card, Divisional, etc.)
          if [ "$DAY_OF_WEEK" = "4" ] || [ "$DAY_OF_WEEK" = "6" ] || [ "$DAY_OF_WEEK" = "7" ] || [ "$DAY_OF_WEEK" = "1" ]; then
            SPORTS="$SPORTS,nfl"
          fi

          echo "sports=$SPORTS" >> $GITHUB_OUTPUT
          echo "Running props for: $SPORTS"

      - name: Generate NBA props
        if: contains(steps.sports.outputs.sports, 'nba')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-agentic-nba-props.js --store=1

      - name: Generate NHL props
        if: contains(steps.sports.outputs.sports, 'nhl')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-agentic-nhl-props.js --store=1

      - name: Generate NFL props
        if: contains(steps.sports.outputs.sports, 'nfl')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-agentic-nfl-props.js --store=1

      - name: Generate NFL TD props
        if: contains(steps.sports.outputs.sports, 'nfl')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-agentic-nfl-td.js --store=1

      - name: Log completion
        run: echo "Props generation completed at $(date)"
