name: DFS Lineups

on:
  schedule:
    # 12:20 PM EST = 5:20 PM UTC (17:20)
    - cron: '20 17 * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform (dk, fd, or both)'
        required: false
        default: 'both'
      limit:
        description: 'Max slates per platform (0 = all)'
        required: false
        default: '0'
      force:
        description: 'Force regenerate existing lineups'
        required: false
        default: 'false'

env:
  TZ: America/New_York

# Prevent concurrent runs from cancelling each other
concurrency:
  group: dfs-lineups
  cancel-in-progress: false

jobs:
  generate-lineups:
    runs-on: ubuntu-latest
    timeout-minutes: 200

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gary2.0/package-lock.json

      - name: Install dependencies
        working-directory: gary2.0
        run: npm ci --legacy-peer-deps

      - name: Generate DFS Lineups
        working-directory: gary2.0
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: |
          ARGS=""
          PLATFORM="${{ github.event.inputs.platform }}"
          if [ "$PLATFORM" == "dk" ]; then
            ARGS="$ARGS --dk"
          elif [ "$PLATFORM" == "fd" ]; then
            ARGS="$ARGS --fd"
          fi
          if [ "${{ github.event.inputs.limit }}" != "0" ] && [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.force }}" == "true" ]; then
            ARGS="$ARGS --force"
          fi
          echo "Running: node scripts/run-dfs-lineups.js $ARGS"
          node scripts/run-dfs-lineups.js $ARGS

      - name: Summary
        if: always()
        run: echo "DFS Lineups completed at $(date)"
