name: Daily Results Check

# Runs at 4am EST (9:00 UTC standard time, 8:00 UTC during DST)
# Adjust cron if daylight saving time matters
on:
  schedule:
    - cron: '0 9 * * *'  # 4am EST (standard time)
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-results:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gary2.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gary2.0/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run results script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-all-results.js

      - name: Log completion
        run: echo "Results check completed at $(date)"
