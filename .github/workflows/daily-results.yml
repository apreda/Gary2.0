name: Daily Results Check

# Cloud grader (laptop-independent) — posts the overnight slate's results early,
# even when the local laptop scheduler is asleep/dead. run-all-results.js targets
# UTC-yesterday and re-grades + UPDATEs every run, so it's idempotent and a too-early
# run self-corrects on the next pass. Cron is UTC and drifts 1h across DST:
#   06:00 UTC = 2am EDT (summer) / 1am EST (winter)
#   13:00 UTC = 9am EDT (summer) / 8am EST (winter)
on:
  schedule:
    - cron: '0 6 * * *'   # ~2am ET — overnight results post before the user wakes
    - cron: '0 13 * * *'  # ~9am ET — catch-up / re-grade for late West-Coast finishers
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-results:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gary2.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: gary2.0/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run results script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-all-results.js

      - name: Log completion
        run: echo "Results check completed at $(date)"
