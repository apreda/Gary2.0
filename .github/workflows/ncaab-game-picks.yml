name: NCAAB Game Picks

on:
  schedule:
    # 8:20 AM EST = 1:20 PM UTC (13:20)
    - cron: '20 13 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max games to analyze (0 = all)'
        required: false
        default: '0'
      force:
        description: 'Force re-run existing picks'
        required: false
        default: 'false'

env:
  TZ: America/New_York

# Prevent concurrent runs from cancelling each other
concurrency:
  group: ncaab-game-picks
  cancel-in-progress: false

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 200

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gary2.0/package-lock.json

      - name: Install dependencies
        working-directory: gary2.0
        run: npm ci --legacy-peer-deps

      - name: Generate NCAAB Game Picks
        working-directory: gary2.0
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: |
          ARGS="--ncaab"
          if [ "${{ github.event.inputs.limit }}" != "0" ] && [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.force }}" == "true" ]; then
            ARGS="$ARGS --force"
          fi
          echo "Running: node scripts/run-agentic-picks.js $ARGS"
          node scripts/run-agentic-picks.js $ARGS

      - name: Summary
        if: always()
        run: echo "NCAAB Game Picks completed at $(date)"
