name: Daily DFS Lineups

# Runs at 7am EST (12:00 UTC standard time)
# Same time as game picks - runs in parallel
on:
  schedule:
    - cron: '0 12 * * *'  # 7am EST (standard time)
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-dfs:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # DFS is faster than picks/props

    defaults:
      run:
        working-directory: gary2.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gary2.0/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate NBA DFS lineups
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node run-nba-dfs-today.js

      - name: Log completion
        run: echo "DFS lineup generation completed at $(date)"
