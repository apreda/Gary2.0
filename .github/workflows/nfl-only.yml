name: NFL Only - Picks & Props

# Manual trigger only - runs NFL game picks FIRST, then props
on:
  workflow_dispatch:
    inputs:
      matchup:
        description: 'Filter to specific matchup (e.g., "Patriots", "Broncos")'
        required: false
        default: ''
      skip_props:
        description: 'Skip props generation (picks only)'
        required: false
        default: 'false'

jobs:
  nfl-complete:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # GitHub max is 360 min (6 hrs)

    defaults:
      run:
        working-directory: gary2.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gary2.0/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate NFL game picks (FIRST)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.matchup }}" ]; then
            node scripts/run-agentic-picks.js --nfl --matchup "${{ github.event.inputs.matchup }}" --limit 1
          else
            node scripts/run-agentic-picks.js --nfl
          fi

      - name: Generate NFL props
        if: ${{ github.event.inputs.skip_props != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-agentic-nfl-props.js --store=1

      - name: Generate NFL TD props
        if: ${{ github.event.inputs.skip_props != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-agentic-nfl-td.js --store=1

      - name: Log completion
        run: echo "NFL complete generation finished at $(date)"
