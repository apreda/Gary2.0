name: Daily Pick Generation

# Runs at 7am EST (12:00 UTC standard time, 11:00 UTC during DST)
# Early enough for users to see picks before games
on:
  schedule:
    - cron: '0 12 * * *'  # 7am EST (standard time)
  workflow_dispatch:  # Allow manual trigger
    inputs:
      sports:
        description: 'Sports to run (comma-separated: nba,nhl,ncaab,nfl,ncaaf or all)'
        required: false
        default: 'all'

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Pick generation can take a while

    defaults:
      run:
        working-directory: gary2.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gary2.0/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Determine which sports to run based on day of week
      # NFL: Only on Thursday, Sunday, Monday (game days)
      # NCAAF: Only on Thursday, Friday, Saturday (game days)
      # NBA/NHL/NCAAB: Daily
      - name: Determine sports to run
        id: sports
        run: |
          DAY_OF_WEEK=$(date +%u)  # 1=Monday, 7=Sunday

          # Manual override if specified
          if [ "${{ github.event.inputs.sports }}" != "" ] && [ "${{ github.event.inputs.sports }}" != "all" ]; then
            echo "sports=${{ github.event.inputs.sports }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          SPORTS="nba,nhl,ncaab"

          # Add NFL on Thursday (4), Sunday (7), Monday (1)
          if [ "$DAY_OF_WEEK" = "4" ] || [ "$DAY_OF_WEEK" = "7" ] || [ "$DAY_OF_WEEK" = "1" ]; then
            SPORTS="$SPORTS,nfl"
          fi

          # Add NCAAF on Thursday (4), Friday (5), Saturday (6)
          if [ "$DAY_OF_WEEK" = "4" ] || [ "$DAY_OF_WEEK" = "5" ] || [ "$DAY_OF_WEEK" = "6" ]; then
            SPORTS="$SPORTS,ncaaf"
          fi

          echo "sports=$SPORTS" >> $GITHUB_OUTPUT
          echo "Running picks for: $SPORTS"

      # ═══════════════════════════════════════════════════════════════
      # GAME PICKS
      # ═══════════════════════════════════════════════════════════════
      - name: Generate NBA game picks
        if: contains(steps.sports.outputs.sports, 'nba')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-agentic-picks.js --nba

      - name: Generate NHL game picks
        if: contains(steps.sports.outputs.sports, 'nhl')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-agentic-picks.js --nhl

      - name: Generate NCAAB game picks
        if: contains(steps.sports.outputs.sports, 'ncaab')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-agentic-picks.js --ncaab

      - name: Generate NFL game picks
        if: contains(steps.sports.outputs.sports, 'nfl')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-agentic-picks.js --nfl

      - name: Generate NCAAF game picks
        if: contains(steps.sports.outputs.sports, 'ncaaf')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-agentic-picks.js --ncaaf

      # ═══════════════════════════════════════════════════════════════
      # PLAYER PROPS
      # ═══════════════════════════════════════════════════════════════
      - name: Generate NBA props
        if: contains(steps.sports.outputs.sports, 'nba')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-agentic-nba-props.js

      - name: Generate NHL props
        if: contains(steps.sports.outputs.sports, 'nhl')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-agentic-nhl-props.js

      - name: Generate NFL props
        if: contains(steps.sports.outputs.sports, 'nfl')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node scripts/run-agentic-nfl-props.js

      # ═══════════════════════════════════════════════════════════════
      # DFS LINEUPS
      # ═══════════════════════════════════════════════════════════════
      - name: Generate NBA DFS lineups
        if: contains(steps.sports.outputs.sports, 'nba')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          QRNG_API_KEY: ${{ secrets.QRNG_API_KEY }}
          TANK01_RAPIDAPI_KEY: ${{ secrets.TANK01_RAPIDAPI_KEY }}
        run: node run-nba-dfs-today.js

      - name: Log completion
        run: echo "Pick generation completed at $(date)"
