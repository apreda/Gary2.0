<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'Barlow'; src: url('assets/BarlowCondensed-Bold.ttf'); font-weight: 700; }
  @font-face { font-family: 'JBMono'; src: url('assets/JetBrainsMono-Bold.ttf'); font-weight: 700; }
  @font-face { font-family: 'InterSB'; src: url('assets/Inter-SemiBold.ttf'); font-weight: 600; }
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; background: #060505; overflow: hidden; }
  .stage { position: absolute; inset: 0; }
  .scene { position: absolute; inset: 0; opacity: 0; }
  .hookwrap { position: absolute; left: 90px; right: 90px; top: 0; height: 100%; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
  .hookline { font-family: 'Barlow'; font-weight: 700; color: #fff; font-size: 150px; line-height: 0.98; text-transform: uppercase; opacity: 0; }
  .hookline .hl { color: #14B8A6; }
  .hooknum { font-size: 300px; }
  .cardwrap { position: absolute; left: 70px; right: 70px; top: 50%; transform: translateY(-50%); }
  .cardimg { width: 100%; border-radius: 36px; box-shadow: 0 40px 90px rgba(0,0,0,.6); display: block; }
  .caption { position: absolute; left: 90px; right: 90px; bottom: 260px; font-family: 'InterSB'; font-size: 52px; color: #ECE9E4; text-align: center; opacity: 0; }
  .endwrap { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 26px; }
  .endava { width: 210px; height: 210px; border-radius: 50%; opacity: 0; }
  .endline { font-family: 'Barlow'; font-weight: 700; color: #fff; font-size: 128px; line-height: 1; text-transform: uppercase; opacity: 0; }
  .endline.gold { color: #C9A227; }
  .handle { font-family: 'JBMono'; font-size: 40px; letter-spacing: 4px; color: #C9A227; margin-top: 18px; opacity: 0; }
  .watermark { position: absolute; right: 70px; top: 66px; font-family: 'JBMono'; font-size: 30px; letter-spacing: 4px; color: rgba(201,162,39,.85); opacity: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="watermark" id="wm">GARY A.I.</div>

  <!-- S1: hook stat -->
  <div class="scene" id="s1">
    <div class="hookwrap">
      <div class="hookline" id="s1a">NORWAY</div>
      <div class="hookline" id="s1b">CONCEDES</div>
      <div class="hookline hooknum hl" id="s1c">2.0</div>
      <div class="hookline" id="s1d">GOALS A MATCH</div>
    </div>
  </div>

  <!-- S2: counter stat -->
  <div class="scene" id="s2">
    <div class="hookwrap">
      <div class="hookline" id="s2a">BRAZIL</div>
      <div class="hookline" id="s2b">GIVES UP</div>
      <div class="hookline hooknum hl" id="s2c">0.5</div>
    </div>
  </div>

  <!-- S3: the card -->
  <div class="scene" id="s3">
    <div class="cardwrap" id="cardwrap"><img class="cardimg" src="assets/card620.png"></div>
    <div class="caption" id="cap">I'm on the Brazil moneyline tonight.</div>
  </div>

  <!-- S4: close -->
  <div class="scene" id="s4">
    <div class="endwrap">
      <img class="endava" id="ava" src="assets/avatar96.png">
      <div class="endline" id="e1" style="font-size:92px">A PICK FOR EVERY GAME.</div>
      <div class="endline gold" id="e2">FREE IN THE APP.</div>
      <div class="handle" id="e3">@BETWITHGARY</div>
    </div>
  </div>
</div>

<script>
// Injected per-clip data (make-pick-clip.cjs replaces this block's CLIP object; the defaults below are the
// Jul 5 Brazil demo so the template always renders standalone).
window.CLIP = window.CLIP || {
  s1: ["NORWAY", "CONCEDES", "2.0", "GOALS A MATCH"],
  s2: ["BRAZIL", "GIVES UP", "0.5"],
  caption: "I'm on the Brazil moneyline tonight.",
  card: "assets/card620.png",
};
</script>
<script>
// Deterministic seek(t): every frame is a pure function of t (seconds). No CSS animations, no wall clock —
// the renderer steps t frame by frame and screenshots, so renders are reproducible and resumable.
const $ = (id) => document.getElementById(id);
// populate template from CLIP (third hook line is always the big teal number)
["s1a","s1b","s1c","s1d"].forEach((id, i) => { $(id).textContent = window.CLIP.s1[i] ?? ""; });
["s2a","s2b","s2c"].forEach((id, i) => { $(id).textContent = window.CLIP.s2[i] ?? ""; });
$("cap").textContent = window.CLIP.caption;
document.querySelector(".cardimg").src = window.CLIP.card;
const clamp01 = (x) => Math.max(0, Math.min(1, x));
const outQuint = (x) => 1 - Math.pow(1 - x, 5);
const outBack = (x) => { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2); };
// progress of a keyframe starting at `start` lasting `dur`, eased
const kf = (t, start, dur, easeFn = outQuint) => easeFn(clamp01((t - start) / dur));
// scene visibility window with quick fade in/out
function windowed(t, start, end, fade = 0.18) {
  if (t < start || t > end + fade) return 0;
  if (t < start + fade) return (t - start) / fade;
  if (t > end) return 1 - (t - end) / fade;
  return 1;
}
// word-punch: pop from 1.14 scale + rise
function punch(el, t, start, dur = 0.34) {
  const p = kf(t, start, dur, outBack);
  const vis = t >= start ? 1 : 0;
  el.style.opacity = vis * Math.min(1, p * 1.6);
  el.style.transform = `translateY(${(1 - p) * 46}px) scale(${1.14 - 0.14 * p})`;
}

const T = { s1: 0, s2: 2.5, s3: 5.0, s4: 13.4, end: 17.6 };

window.seek = function (t) {
  // watermark rides everything after the cold open
  $('wm').style.opacity = kf(t, 1.2, 0.5);

  // S1
  $('s1').style.opacity = windowed(t, T.s1, T.s2 - 0.12, 0.001);
  punch($('s1a'), t, 0.10); punch($('s1b'), t, 0.26);
  punch($('s1c'), t, 0.55); punch($('s1d'), t, 0.85);

  // S2
  $('s2').style.opacity = windowed(t, T.s2, T.s3 - 0.12, 0.06);
  punch($('s2a'), t, T.s2 + 0.06); punch($('s2b'), t, T.s2 + 0.22); punch($('s2c'), t, T.s2 + 0.50);

  // S3: card slides up, settles, slow zoom; caption late
  $('s3').style.opacity = windowed(t, T.s3, T.s4 - 0.15, 0.10);
  const slide = kf(t, T.s3, 0.85, outQuint);
  const zoom = 1 + 0.035 * clamp01((t - T.s3) / (T.s4 - T.s3));
  $('cardwrap').style.transform = `translateY(calc(-50% + ${(1 - slide) * 520}px)) scale(${zoom})`;
  $('cardwrap').style.opacity = slide;
  $('cap').style.opacity = kf(t, T.s3 + 3.2, 0.6);
  $('cap').style.transform = `translateY(${(1 - kf(t, T.s3 + 3.2, 0.6)) * 30}px)`;

  // S4: close
  $('s4').style.opacity = windowed(t, T.s4, T.end, 0.12);
  const ap = kf(t, T.s4 + 0.05, 0.5, outBack);
  $('ava').style.opacity = ap; $('ava').style.transform = `scale(${0.6 + 0.4 * ap})`;
  punch($('e1'), t, T.s4 + 0.45); punch($('e2'), t, T.s4 + 0.85);
  $('e3').style.opacity = kf(t, T.s4 + 1.35, 0.5);
};
window.CLIP_DURATION = T.end;
window.seek(0);
</script>
</body>
</html>
