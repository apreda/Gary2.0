<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Live indicators — 10 different concepts</title>
<style>
  :root{--bg:#0b0a09;--card:#181616;--line:rgba(255,255,255,.09);--gold:#C9A227;--teal:#3FB6A8;
    --mlb:#63D17E;--liveg:#3FB950;--red:#FF4438;--amber:#E8B339;--dim2:rgba(255,255,255,.34);
    --mono:"SF Mono",ui-monospace,Menlo,monospace;--disp:"Helvetica Neue",Arial,sans-serif;}
  *{box-sizing:border-box}
  body{background:#000;color:#fff;font-family:var(--disp);margin:0;padding:24px}
  h1{font-family:var(--mono);font-weight:700;color:var(--gold);font-size:15px;text-align:center;margin:0 0 3px}
  .sub{color:rgba(255,255,255,.5);font-size:11.5px;text-align:center;margin:0 0 22px;font-family:var(--mono)}
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px 22px;max-width:880px;margin:0 auto}
  .cell{display:flex;flex-direction:column;gap:6px}
  .cap{font-family:var(--mono);font-size:10.5px;color:var(--gold)} .cap b{color:#fff} .cap i{color:var(--dim2);font-style:normal}
  .top{background:var(--bg);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px 14px}
  .rule{border-top:1px dashed rgba(201,162,39,.3);margin-bottom:10px}
  .tabrow{display:flex;align-items:center}
  .tabs{display:flex;gap:13px;font-family:var(--mono);font-size:10.5px}
  .tabs .on{color:#fff;border-bottom:2px solid var(--gold);padding-bottom:4px} .tabs .off{color:var(--dim2)}
  .slot{margin-left:auto;display:flex;align-items:center;gap:11px}
  .div{width:1px;height:19px;background:rgba(255,255,255,.12)}
  .mono{font-family:var(--mono)} .mlbc{color:var(--mlb)} .tealc{color:var(--teal)}
  .lab{font-family:var(--mono);font-weight:700;font-size:12px}
  .num{font-family:var(--mono);font-weight:700;font-size:15.5px;color:#fff}
  .tok{display:flex;align-items:center;gap:5px}
  /* animations */
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  @keyframes pulsering{0%{transform:scale(.6);opacity:.7}100%{transform:scale(1.8);opacity:0}}
  @keyframes eq{0%,100%{height:3px}50%{height:11px}}
  @keyframes glow{0%,100%{text-shadow:0 0 5px rgba(63,185,80,.3)}50%{text-shadow:0 0 13px rgba(63,185,80,.85)}}
  @keyframes sweep{0%{background-position:-120px 0}100%{background-position:120px 0}}
  @keyframes dots{0%{opacity:.2}50%{opacity:1}100%{opacity:.2}}
  @keyframes travel{0%{left:0;width:30%}50%{left:35%;width:35%}100%{left:100%;width:0}}
</style></head>
<body>
<h1>Live indicators — 10 different concepts</h1>
<p class="sub">MLB live (0-0) · WC finished (4-0) · several animate — open the file to see</p>
<div class="grid" id="g"></div>
<script>
const ROW=(s)=>`<div class="top"><div class="rule"></div><div class="tabrow">
  <div class="tabs"><span class="on">TODAY</span><span class="off">TOMORROW</span></div>
  <div class="slot"><span class="div"></span>${s}
    <span class="tok"><span class="lab tealc">WC</span><span class="num">4-0</span></span>
  </div></div></div>`;
const M=`<span class="lab mlbc">MLB</span>`, N=`<span class="num">0-0</span>`;
const ideas=[
 ["1","Play ▶ (in-progress / stream)",`<span class="tok"><span style="color:var(--liveg);font-size:9px">▶</span>${M}${N}</span>`],
 ["2","Green capsule",`<span style="display:inline-flex;align-items:center;gap:5px;background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.35);border-radius:13px;padding:3px 9px">${M}<span class="num" style="font-size:14px;color:var(--liveg)">0-0</span></span>`],
 ["3","Equalizer bars (animated)",`<span class="tok">${M}${N}<span style="display:inline-flex;align-items:flex-end;gap:2px;height:12px">
   <span style="width:2.5px;background:var(--liveg);animation:eq .8s ease-in-out infinite"></span>
   <span style="width:2.5px;background:var(--liveg);animation:eq .8s ease-in-out .25s infinite"></span>
   <span style="width:2.5px;background:var(--liveg);animation:eq .8s ease-in-out .5s infinite"></span></span></span>`],
 ["4","Live game COUNT (richer)",`<span class="tok">${M}${N}<span class="mono" style="color:var(--liveg);font-size:9px;font-weight:700">· 42 IN PLAY</span></span>`],
 ["5","LIVE··· animated dots",`<span class="tok">${M}${N}<span class="mono" style="color:var(--liveg);font-size:9.5px;font-weight:700;letter-spacing:.4px">LIVE<span style="animation:dots 1.2s infinite">·</span><span style="animation:dots 1.2s .2s infinite">·</span><span style="animation:dots 1.2s .4s infinite">·</span></span></span>`],
 ["6","NOW badge",`<span class="tok">${M}${N}<span class="mono" style="background:rgba(63,185,80,.16);color:var(--liveg);font-weight:700;font-size:8px;letter-spacing:.6px;border-radius:4px;padding:2px 5px">NOW</span></span>`],
 ["7","Glowing score (animated)",`<span class="tok">${M}<span class="num" style="color:var(--liveg);animation:glow 1.6s ease-in-out infinite">0-0</span></span>`],
 ["8","Blinking dot (animated)",`<span class="tok">${M}${N}<span style="position:relative;width:13px;height:13px;display:inline-flex;align-items:center;justify-content:center">
   <span style="position:absolute;width:6px;height:6px;border-radius:50%;background:var(--liveg);animation:pulsering 1.4s ease-out infinite"></span>
   <span style="width:6px;height:6px;border-radius:50%;background:var(--liveg)"></span></span></span>`],
 ["9","Red broadcast chyron bar",`<span style="display:inline-flex;align-items:stretch;border-radius:4px;overflow:hidden">
   <span style="background:var(--red);width:4px"></span>
   <span style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,68,56,.1);padding:3px 8px">${M}<span class="num" style="font-size:14px">0-0</span><span class="mono" style="color:var(--red);font-size:8px;font-weight:700">LIVE</span></span></span>`],
 ["10","Shimmer sweep on score (animated)",`<span class="tok">${M}<span class="num" style="background:linear-gradient(90deg,#fff 0%,#fff 40%,var(--liveg) 50%,#fff 60%,#fff 100%);background-size:240px 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:sweep 1.8s linear infinite">0-0</span></span>`],
];
document.getElementById("g").innerHTML=ideas.map(([n,name,s])=>`<div class="cell"><div class="cap">OPTION ${n} — <b>${name}</b></div>${ROW(s)}</div>`).join("");
</script>
</body></html>
