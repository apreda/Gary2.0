<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LIVE FORM widget — 10 options</title>
<style>
  :root{
    --bg:#0a0908; --card:#181616; --card2:#1d1b1a; --line:rgba(255,255,255,.08);
    --gold:#C9A227; --teal:#3FB6A8; --mlb:#63D17E; --win:#3FB950; --liveg:#3FB950;
    --dim:rgba(255,255,255,.55); --dim2:rgba(255,255,255,.4);
    --mono:"SF Mono",ui-monospace,Menlo,monospace;
    --disp:"Helvetica Neue",Arial,sans-serif;
    --boxH:206px;
  }
  *{box-sizing:border-box}
  body{background:#000;color:#fff;font-family:var(--disp);margin:0;padding:26px}
  h1{font-family:var(--mono);font-weight:700;color:var(--gold);font-size:15px;letter-spacing:1px;text-align:center;margin:0 0 4px}
  .sub{color:var(--dim);font-size:12px;text-align:center;margin:0 0 22px;font-family:var(--mono)}
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:26px 22px;max-width:1000px;margin:0 auto}
  .opt{display:flex;flex-direction:column;gap:8px}
  .optlabel{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.5px}
  .optlabel b{color:#fff} .optlabel span{color:var(--dim2)}
  .row{display:flex;gap:8px;align-items:flex-start}
  .hl{flex:0 0 62%;background:var(--card);border:1px solid var(--line);border-radius:13px;height:var(--boxH);padding:13px;display:flex;flex-direction:column;overflow:hidden;position:relative}
  .hl .wc{position:absolute;top:11px;right:12px;font-family:var(--mono);font-weight:700;font-size:9px;color:var(--teal)}
  .hl .h{font-weight:800;font-size:16px;line-height:1.14;letter-spacing:-.2px;padding-right:20px}
  .hl .b{margin-top:auto;display:flex;flex-direction:column;gap:7px}
  .hl .b div{font-family:var(--mono);font-size:10.5px;color:rgba(255,255,255,.55)}
  .w{flex:1 1 0;min-width:0;height:var(--boxH)}

  /* shared widget shell */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:13px;height:100%}
  .ttl{font-family:var(--mono);font-weight:700;font-size:8px;letter-spacing:.8px;color:var(--gold)}
  .lg-mlb{color:var(--mlb)} .lg-wc{color:var(--teal)}
  .rec{font-family:var(--disp);font-weight:800;color:#fff;letter-spacing:-.5px}
  .pip{width:5px;height:5px;border-radius:50%;display:inline-block;vertical-align:middle}
  .live{color:var(--liveg)} .quiet{color:var(--dim2)}
  .mono{font-family:var(--mono)}

  /* 1 — Stacked split */
  .w1{display:flex;flex-direction:column}
  .w1 .half{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
  .w1 .half+.half{border-top:1px solid var(--line)}
  .w1 .lab{font-family:var(--mono);font-weight:700;font-size:9px;letter-spacing:1px}
  .w1 .rec{font-size:30px} .w1 .st{font-family:var(--mono);font-size:8px;letter-spacing:.6px}

  /* 2 — Accent-bar cards */
  .w2{display:flex;flex-direction:column;gap:8px;background:none;border:none}
  .w2 .c{flex:1;background:var(--card);border:1px solid var(--line);border-radius:11px;display:flex;overflow:hidden}
  .w2 .bar{width:4px;flex:0 0 4px}
  .w2 .bd{padding:9px 10px;display:flex;flex-direction:column;justify-content:center;gap:2px}
  .w2 .lab{font-family:var(--mono);font-weight:700;font-size:8.5px;letter-spacing:.8px}
  .w2 .rec{font-size:26px} .w2 .st{font-family:var(--mono);font-size:7.5px;letter-spacing:.5px}

  /* 3 — Dot rail */
  .w3{padding:4px 0;display:flex;flex-direction:column;justify-content:center}
  .w3 .r{display:flex;align-items:center;gap:8px;padding:13px 12px}
  .w3 .r+.r{border-top:1px solid var(--line)}
  .w3 .meta{display:flex;flex-direction:column;gap:2px}
  .w3 .lab{font-family:var(--mono);font-weight:700;font-size:8.5px;letter-spacing:.7px}
  .w3 .st{font-family:var(--mono);font-size:7.5px;letter-spacing:.4px}
  .w3 .rec{font-size:22px;margin-left:auto}

  /* 4 — Big number hero */
  .w4{display:flex;flex-direction:column}
  .w4 .half{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .w4 .half+.half{border-top:1px solid var(--line)}
  .w4 .lab{font-family:var(--mono);font-weight:700;font-size:8px;letter-spacing:1px;opacity:.85}
  .w4 .rec{font-size:38px;line-height:1.05;margin:1px 0}
  .w4 .st{font-family:var(--mono);font-size:7px;letter-spacing:.5px}

  /* 5 — Pill stack */
  .w5{background:none;border:none;display:flex;flex-direction:column;justify-content:center;gap:10px;padding:0 2px}
  .w5 .pill{background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:11px 14px;display:flex;align-items:center;gap:8px}
  .w5 .lab{font-family:var(--mono);font-weight:700;font-size:9px;letter-spacing:.6px}
  .w5 .rec{font-size:18px;margin-left:auto} .w5 .st{font-family:var(--mono);font-size:7.5px}

  /* 6 — Status forward */
  .w6{display:flex;flex-direction:column}
  .w6 .half{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
  .w6 .half+.half{border-top:1px solid var(--line)}
  .w6 .half.dim{opacity:.5}
  .w6 .badge{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-weight:700;font-size:9px;letter-spacing:1px}
  .w6 .pip-lg{width:8px;height:8px;border-radius:50%}
  .w6 .rec{font-size:26px} .w6 .lab{font-family:var(--mono);font-size:8px;letter-spacing:.8px;opacity:.7}

  /* 7 — Vertical ticker */
  .w7{display:flex;flex-direction:column;justify-content:center;padding:6px 0}
  .w7 .line{display:flex;align-items:center;gap:7px;padding:11px 11px}
  .w7 .line+.line{border-top:1px solid rgba(255,255,255,.05)}
  .w7 .blk{width:3px;height:26px;border-radius:2px;flex:0 0 3px}
  .w7 .lab{font-family:var(--mono);font-weight:700;font-size:10px}
  .w7 .rec{font-size:15px;font-family:var(--mono);font-weight:700}
  .w7 .st{font-family:var(--mono);font-size:7px;letter-spacing:.4px;margin-left:auto}

  /* 8 — Gradient blocks */
  .w8{display:flex;flex-direction:column;background:none;border:none;gap:8px}
  .w8 .blk{flex:1;border-radius:11px;border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .w8 .mlbg{background:linear-gradient(135deg,rgba(99,209,126,.16),rgba(99,209,126,.03))}
  .w8 .wcg{background:linear-gradient(135deg,rgba(63,182,168,.16),rgba(63,182,168,.03))}
  .w8 .lab{font-family:var(--mono);font-weight:700;font-size:8.5px;letter-spacing:.9px}
  .w8 .rec{font-size:28px} .w8 .st{font-family:var(--mono);font-size:7.5px}

  /* 9 — Sparkline form */
  .w9{display:flex;flex-direction:column}
  .w9 .half{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
  .w9 .half+.half{border-top:1px solid var(--line)}
  .w9 .top{display:flex;align-items:baseline;gap:7px}
  .w9 .lab{font-family:var(--mono);font-weight:700;font-size:8.5px;letter-spacing:.7px}
  .w9 .rec{font-size:20px}
  .w9 .trail{display:flex;gap:3px}
  .w9 .t{width:9px;height:9px;border-radius:2px;font-size:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700}
  .w9 .tw{background:rgba(63,185,80,.22);color:#7be08a} .w9 .tl{background:rgba(229,72,77,.18);color:#e5848a}

  /* 10 — Glass minimal */
  .w10{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(6px);display:flex;flex-direction:column}
  .w10 .half{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
  .w10 .half+.half{border-top:1px solid rgba(255,255,255,.06)}
  .w10 .lab{font-family:var(--mono);font-weight:600;font-size:8px;letter-spacing:1.4px}
  .w10 .rec{font-size:27px;font-weight:300}
  .w10 .udot{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:7px;letter-spacing:.6px}
</style>
</head>
<body>
<h1>LIVE FORM — as a widget right of the headlines</h1>
<p class="sub">10 options · MLB holds last night (9-6) · World Cup is live (2-0)</p>
<div class="grid" id="g"></div>

<script>
// shared simplified headline card (focus stays on the widget)
const HL = `<div class="hl"><span class="wc">● WC</span>
  <div class="h">Brazil beat Japan 2-1 as the Over 2.5 hits</div>
  <div class="b"><div>— Ayase Ueda 2 shots (-167)</div><div>— Over 2.5 goals hit · 3 total</div></div></div>`;

const opts = [
 ["1","Stacked split", `<div class="panel w1">
    <div class="half"><div class="lab lg-mlb">MLB</div><div class="rec">9-6</div><div class="st quiet">LAST NIGHT</div></div>
    <div class="half"><div class="lab lg-wc">WORLD CUP</div><div class="rec">2-0</div><div class="st live">● LIVE</div></div></div>`],

 ["2","Accent-bar cards", `<div class="w2">
    <div class="c"><div class="bar" style="background:var(--mlb)"></div><div class="bd"><div class="lab lg-mlb">MLB</div><div class="rec">9-6</div><div class="st quiet">LAST NIGHT</div></div></div>
    <div class="c"><div class="bar" style="background:var(--teal)"></div><div class="bd"><div class="lab lg-wc">WORLD CUP</div><div class="rec">2-0</div><div class="st live">● LIVE</div></div></div></div>`],

 ["3","Dot rail", `<div class="panel w3">
    <div class="r"><span class="pip quiet" style="background:var(--dim2)"></span><div class="meta"><span class="lab lg-mlb">MLB</span><span class="st quiet">LAST NIGHT</span></div><span class="rec mono">9-6</span></div>
    <div class="r"><span class="pip" style="background:var(--liveg)"></span><div class="meta"><span class="lab lg-wc">WORLD CUP</span><span class="st live">LIVE</span></div><span class="rec mono">2-0</span></div></div>`],

 ["4","Big-number hero", `<div class="panel w4">
    <div class="half"><div class="lab lg-mlb">MLB</div><div class="rec">9-6</div><div class="st quiet">LAST NIGHT</div></div>
    <div class="half"><div class="lab lg-wc">WORLD CUP</div><div class="rec">2-0</div><div class="st live">● LIVE</div></div></div>`],

 ["5","Pill stack", `<div class="w5">
    <div class="pill"><span class="lab lg-mlb">MLB</span><span class="rec mono">9-6</span><span class="st quiet" style="margin-left:auto">LAST NIGHT</span></div>
    <div class="pill"><span class="lab lg-wc">WC</span><span class="rec mono">2-0</span><span class="st live" style="margin-left:auto">● LIVE</span></div></div>`],

 ["6","Status-forward", `<div class="panel w6">
    <div class="half dim"><div class="badge quiet"><span class="pip-lg" style="background:var(--dim2)"></span>LAST NIGHT</div><div class="rec">9-6</div><div class="lab lg-mlb">MLB</div></div>
    <div class="half"><div class="badge live"><span class="pip-lg" style="background:var(--liveg)"></span>LIVE</div><div class="rec">2-0</div><div class="lab lg-wc">WORLD CUP</div></div></div>`],

 ["7","Vertical ticker", `<div class="panel w7">
    <div class="line"><span class="blk" style="background:var(--mlb)"></span><span class="lab lg-mlb">MLB</span><span class="rec">9-6</span><span class="st quiet">LAST NIGHT</span></div>
    <div class="line"><span class="blk" style="background:var(--teal)"></span><span class="lab lg-wc">WC</span><span class="rec">2-0</span><span class="st live">● LIVE</span></div></div>`],

 ["8","Gradient blocks", `<div class="w8">
    <div class="blk mlbg"><div class="lab lg-mlb">MLB</div><div class="rec">9-6</div><div class="st quiet">LAST NIGHT</div></div>
    <div class="blk wcg"><div class="lab lg-wc">WORLD CUP</div><div class="rec">2-0</div><div class="st live">● LIVE</div></div></div>`],

 ["9","Sparkline form", `<div class="panel w9">
    <div class="half"><div class="top"><span class="lab lg-mlb">MLB</span><span class="rec">9-6</span></div>
      <div class="trail"><span class="t tw">W</span><span class="t tl">L</span><span class="t tw">W</span><span class="t tw">W</span><span class="t tl">L</span></div></div>
    <div class="half"><div class="top"><span class="lab lg-wc">WC</span><span class="rec">2-0</span></div>
      <div class="trail"><span class="t tw">W</span><span class="t tw">W</span><span class="st live" style="align-self:center;margin-left:3px">● LIVE</span></div></div></div>`],

 ["10","Glass minimal", `<div class="panel w10">
    <div class="half"><div class="lab lg-mlb">MLB</div><div class="rec">9-6</div><div class="udot quiet"><span class="pip" style="background:var(--dim2)"></span>LAST NIGHT</div></div>
    <div class="half"><div class="lab lg-wc">WORLD CUP</div><div class="rec">2-0</div><div class="udot live"><span class="pip" style="background:var(--liveg)"></span>LIVE</div></div></div>`],
];

document.getElementById("g").innerHTML = opts.map(([n,name,w])=>`
  <div class="opt">
    <div class="optlabel">OPTION ${n} — <b>${name}</b></div>
    <div class="row">${HL}<div class="w">${w}</div></div>
  </div>`).join("");
</script>
</body>
</html>
