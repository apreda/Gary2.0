<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LIVE FORM widget — round 2 (smaller, different)</title>
<style>
  :root{
    --bg:#0a0908; --card:#181616; --card2:#1d1b1a; --line:rgba(255,255,255,.08);
    --gold:#C9A227; --teal:#3FB6A8; --mlb:#63D17E; --win:#3FB950; --liveg:#3FB950;
    --loss:#E5614D; --dim:rgba(255,255,255,.55); --dim2:rgba(255,255,255,.38);
    --mono:"SF Mono",ui-monospace,Menlo,monospace;
    --disp:"Helvetica Neue",Arial,sans-serif;
    --H:206px;
  }
  *{box-sizing:border-box}
  body{background:#000;color:#fff;font-family:var(--disp);margin:0;padding:26px}
  h1{font-family:var(--mono);font-weight:700;color:var(--gold);font-size:15px;letter-spacing:1px;text-align:center;margin:0 0 4px}
  .sub{color:var(--dim);font-size:12px;text-align:center;margin:0 0 22px;font-family:var(--mono)}
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:26px 22px;max-width:1020px;margin:0 auto}
  .opt{display:flex;flex-direction:column;gap:8px}
  .optlabel{font-family:var(--mono);font-size:11px;color:var(--gold)}
  .optlabel b{color:#fff} .optlabel span{color:var(--dim2)}
  .row{display:flex;gap:8px;align-items:flex-start;height:var(--H)}
  /* shared simplified headline */
  .hl{flex:0 0 62%;background:var(--card);border:1px solid var(--line);border-radius:13px;height:100%;padding:13px;display:flex;flex-direction:column;overflow:hidden;position:relative}
  .hl .wc{position:absolute;top:11px;right:12px;font-family:var(--mono);font-weight:700;font-size:9px;color:var(--teal)}
  .hl .h{font-weight:800;font-size:16px;line-height:1.14;padding-right:20px}
  .hl .b{margin-top:auto;display:flex;flex-direction:column;gap:7px}
  .hl .b div{font-family:var(--mono);font-size:10.5px;color:rgba(255,255,255,.5)}
  .w{flex:1 1 0;min-width:0;height:100%}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:13px}
  .mono{font-family:var(--mono)} .mlb{color:var(--mlb)} .teal{color:var(--teal)}
  .lv{color:var(--liveg)} .q{color:var(--dim2)}
  .lab{font-family:var(--mono);font-weight:700;letter-spacing:.6px}
  .ttl{font-family:var(--mono);font-weight:700;font-size:8px;letter-spacing:1px;color:var(--gold)}
  .pip{width:5px;height:5px;border-radius:50%;display:inline-block}

  /* A — Quiet list (small record, top-aligned, air below) */
  .wA{height:100%;padding:13px 13px}
  .wA .ttl{margin-bottom:11px}
  .wA .it{margin-bottom:13px}
  .wA .it .lab{font-size:9px} .wA .it .num{font-family:var(--mono);font-size:17px;font-weight:700;margin-top:2px}
  .wA .it .st{font-family:var(--mono);font-size:8px;margin-top:1px}

  /* B — Pip trail */
  .wB{height:100%;padding:13px;display:flex;flex-direction:column;justify-content:center;gap:16px}
  .wB .it .top{display:flex;justify-content:space-between;align-items:baseline}
  .wB .it .lab{font-size:9px} .wB .it .num{font-family:var(--mono);font-size:14px;font-weight:700}
  .wB .trail{display:flex;gap:3px;margin-top:6px}
  .wB .d{width:11px;height:6px;border-radius:2px}
  .wB .dw{background:var(--win)} .wB .dl{background:rgba(229,97,77,.55)}
  .wB .st{font-family:var(--mono);font-size:7.5px;margin-top:5px}

  /* C — Horizontal strip (short, pinned top, air below) */
  .wC{height:auto}
  .wC .strip{display:flex;align-items:center;border:1px solid var(--line);background:var(--card);border-radius:11px;padding:11px 12px;gap:10px}
  .wC .cell{display:flex;align-items:center;gap:6px}
  .wC .cell+.cell{padding-left:10px;border-left:1px solid var(--line)}
  .wC .lab{font-size:8.5px} .wC .num{font-family:var(--mono);font-size:14px;font-weight:700}

  /* D — Win-rate bars */
  .wD{height:100%;padding:14px 13px;display:flex;flex-direction:column;justify-content:center;gap:18px}
  .wD .it .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .wD .lab{font-size:9px} .wD .num{font-family:var(--mono);font-size:13px;font-weight:700;color:#fff}
  .wD .bar{height:5px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
  .wD .fill{height:100%;border-radius:3px}
  .wD .st{font-family:var(--mono);font-size:7px;margin-top:5px}

  /* E — Live-first hero (live = focus, settled = footnote) */
  .wE{height:100%;padding:15px 13px;display:flex;flex-direction:column;justify-content:center}
  .wE .hero .badge{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-weight:700;font-size:9px;letter-spacing:.8px;color:var(--liveg)}
  .wE .hero .num{font-family:var(--mono);font-size:24px;font-weight:700;margin:3px 0}
  .wE .hero .lab{font-size:8.5px}
  .wE .foot{margin-top:16px;padding-top:12px;border-top:1px solid var(--line);font-family:var(--mono);font-size:10px;color:var(--dim2)}
  .wE .foot b{color:var(--mlb)} .wE .foot .n{color:rgba(255,255,255,.7)}

  /* F — Mini table (hugs content) */
  .wF{height:auto;overflow:hidden}
  .wF table{width:100%;border-collapse:collapse;font-family:var(--mono)}
  .wF th{font-size:7px;letter-spacing:.6px;color:var(--dim2);text-align:left;padding:8px 10px 6px;font-weight:700}
  .wF td{font-size:11px;padding:9px 10px;border-top:1px solid var(--line)}
  .wF .num{font-weight:700;font-size:13px} .wF .st{font-size:7.5px}

  /* G — Chips (short, top) */
  .wG{height:auto;background:none;border:none;display:flex;flex-direction:column;gap:8px}
  .wG .chip{display:inline-flex;align-items:center;gap:7px;border-radius:18px;padding:8px 12px;font-family:var(--mono);width:fit-content}
  .wG .live{border:1px solid rgba(63,185,80,.4);background:rgba(63,185,80,.08)}
  .wG .past{border:1px solid var(--line);background:var(--card2)}
  .wG .lab{font-size:8.5px;font-weight:700} .wG .num{font-size:13px;font-weight:700} .wG .st{font-size:7px}

  /* H — Centered minimal (small, lots of air) */
  .wH{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
  .wH .it{text-align:center}
  .wH .lab{font-size:8px;letter-spacing:1.2px;opacity:.85}
  .wH .num{font-family:var(--mono);font-size:18px;font-weight:700;margin-top:3px}
  .wH .st{font-family:var(--mono);font-size:7px;margin-top:2px;display:flex;align-items:center;gap:4px;justify-content:center}

  /* I — Status rows (compact, small record right) */
  .wI{height:100%;display:flex;flex-direction:column;justify-content:center}
  .wI .r{display:flex;align-items:center;gap:8px;padding:12px 12px}
  .wI .r+.r{border-top:1px solid var(--line)}
  .wI .meta{display:flex;flex-direction:column;gap:2px}
  .wI .lab{font-size:8.5px} .wI .st{font-family:var(--mono);font-size:7px}
  .wI .num{font-family:var(--mono);font-size:15px;font-weight:700;margin-left:auto;color:#fff}
</style>
</head>
<body>
<h1>LIVE FORM widget — round 2</h1>
<p class="sub">smaller records · genuinely different structures · MLB 9-6 last night · WC 2-0 live</p>
<div class="grid" id="g"></div>
<script>
const HL = `<div class="hl"><span class="wc">● WC</span>
  <div class="h">Brazil beat Japan 2-1 as the Over 2.5 hits</div>
  <div class="b"><div>— Ayase Ueda 2 shots (-167)</div><div>— Over 2.5 goals hit · 3 total</div></div></div>`;

const opts = [
 ["A","Quiet list + air", `<div class="panel wA">
   <div class="ttl">LIVE FORM</div>
   <div class="it"><div class="lab mlb">MLB</div><div class="num">9-6</div><div class="st q">LAST NIGHT</div></div>
   <div class="it"><div class="lab teal">WORLD CUP</div><div class="num">2-0</div><div class="st lv">● LIVE</div></div></div>`],

 ["B","Pip trail", `<div class="panel wB">
   <div class="it"><div class="top"><span class="lab mlb">MLB</span><span class="num">9-6</span></div>
     <div class="trail"><span class="d dw"></span><span class="d dw"></span><span class="d dl"></span><span class="d dw"></span><span class="d dl"></span></div>
     <div class="st q">LAST NIGHT</div></div>
   <div class="it"><div class="top"><span class="lab teal">WORLD CUP</span><span class="num">2-0</span></div>
     <div class="trail"><span class="d dw"></span><span class="d dw"></span></div>
     <div class="st lv">● LIVE</div></div></div>`],

 ["C","Horizontal strip", `<div class="wC"><div class="strip">
   <div class="cell"><span class="lab mlb">MLB</span><span class="num">9-6</span></div>
   <div class="cell"><span class="lab teal">WC</span><span class="num">2-0</span><span class="pip" style="background:var(--liveg)"></span></div>
 </div></div>`],

 ["D","Win-rate bars", `<div class="panel wD">
   <div class="it"><div class="top"><span class="lab mlb">MLB</span><span class="num">9-6</span></div>
     <div class="bar"><div class="fill" style="width:60%;background:var(--mlb)"></div></div><div class="st q">LAST NIGHT · 60%</div></div>
   <div class="it"><div class="top"><span class="lab teal">WORLD CUP</span><span class="num">2-0</span></div>
     <div class="bar"><div class="fill" style="width:100%;background:var(--teal)"></div></div><div class="st lv">● LIVE · 100%</div></div></div>`],

 ["E","Live-first hero", `<div class="panel wE">
   <div class="hero"><div class="badge"><span class="pip" style="background:var(--liveg)"></span>WORLD CUP · LIVE</div>
     <div class="num">2-0</div></div>
   <div class="foot">MLB <span class="n">9-6</span> · last night</div></div>`],

 ["F","Mini table", `<div class="panel wF"><table>
   <tr><th>SPORT</th><th>W-L</th><th></th></tr>
   <tr><td class="mlb">MLB</td><td class="num">9-6</td><td class="st q">LAST NT</td></tr>
   <tr><td class="teal">WC</td><td class="num">2-0</td><td class="st lv">● LIVE</td></tr>
 </table></div>`],

 ["G","Chips", `<div class="wG">
   <div class="chip live"><span class="lab teal">WC</span><span class="num">2-0</span><span class="st lv">● LIVE</span></div>
   <div class="chip past"><span class="lab mlb">MLB</span><span class="num">9-6</span><span class="st q">LAST NIGHT</span></div></div>`],

 ["H","Centered minimal", `<div class="panel wH">
   <div class="it"><div class="lab mlb">MLB</div><div class="num">9-6</div><div class="st q">last night</div></div>
   <div class="it"><div class="lab teal">WORLD CUP</div><div class="num">2-0</div><div class="st lv"><span class="pip" style="background:var(--liveg)"></span>live</div></div></div>`],

 ["I","Status rows", `<div class="panel wI">
   <div class="r"><span class="pip" style="background:var(--dim2)"></span><div class="meta"><span class="lab mlb">MLB</span><span class="st q">LAST NIGHT</span></div><span class="num">9-6</span></div>
   <div class="r"><span class="pip" style="background:var(--liveg)"></span><div class="meta"><span class="lab teal">WORLD CUP</span><span class="st lv">LIVE</span></div><span class="num">2-0</span></div></div>`],
];
document.getElementById("g").innerHTML = opts.map(([n,name,w])=>`
  <div class="opt"><div class="optlabel">OPTION ${n} — <b>${name}</b></div>
    <div class="row">${HL}<div class="w">${w}</div></div></div>`).join("");
</script>
</body>
</html>
