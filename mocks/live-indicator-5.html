<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>"Live" indicators — 5 ideas</title>
<style>
  :root{--bg:#0b0a09;--card:#181616;--line:rgba(255,255,255,.09);--gold:#C9A227;--teal:#3FB6A8;
    --mlb:#63D17E;--liveg:#3FB950;--red:#FF4438;--dim2:rgba(255,255,255,.34);
    --mono:"SF Mono",ui-monospace,Menlo,monospace;--disp:"Helvetica Neue",Arial,sans-serif;}
  *{box-sizing:border-box}
  body{background:#000;color:#fff;font-family:var(--disp);margin:0;padding:26px}
  h1{font-family:var(--mono);font-weight:700;color:var(--gold);font-size:15px;text-align:center;margin:0 0 3px}
  .sub{color:rgba(255,255,255,.5);font-size:11.5px;text-align:center;margin:0 0 24px;font-family:var(--mono)}
  .grid{display:grid;grid-template-columns:repeat(1,minmax(0,1fr));gap:18px;max-width:560px;margin:0 auto}
  .cell{display:flex;flex-direction:column;gap:7px}
  .cap{font-family:var(--mono);font-size:11px;color:var(--gold)} .cap b{color:#fff} .cap i{color:var(--dim2);font-style:normal}
  .top{background:var(--bg);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:13px 15px}
  .rule{border-top:1px dashed rgba(201,162,39,.3);margin-bottom:11px}
  .tabrow{display:flex;align-items:center}
  .tabs{display:flex;gap:14px;font-family:var(--mono);font-size:11px}
  .tabs .on{color:#fff;border-bottom:2px solid var(--gold);padding-bottom:4px} .tabs .off{color:var(--dim2)}
  .slot{margin-left:auto;display:flex;align-items:center;gap:12px}
  .div{width:1px;height:19px;background:rgba(255,255,255,.12)}
  .mono{font-family:var(--mono)} .mlbc{color:var(--mlb)} .tealc{color:var(--teal)}
  .lab{font-family:var(--mono);font-weight:700;font-size:12.5px}
  .num{font-family:var(--mono);font-weight:700;font-size:16px;color:#fff}
  .tok{display:flex;align-items:center;gap:5px}
  .pip{width:6px;height:6px;border-radius:50%;background:var(--liveg)}
</style></head>
<body>
<h1>"Live" indicators — 5 ways to flag MLB is live</h1>
<p class="sub">MLB is live (0-0), WC finished (4-0) — indicator only on the live sport</p>
<div class="grid" id="g"></div>
<script>
const ROW = (mlbSlot)=>`<div class="top"><div class="rule"></div>
  <div class="tabrow"><div class="tabs"><span class="on">TODAY</span><span class="off">TOMORROW</span></div>
    <div class="slot"><span class="div"></span>${mlbSlot}
      <span class="tok"><span class="lab tealc">WC</span><span class="num">4-0</span></span>
    </div></div></div>`;

const ideas = [
 ["1","Broadcast LIVE pill",`<i>— red pill, ESPN/Apple-Sports standard, the strongest read</i>`,
   `<span class="tok"><span class="lab mlbc">MLB</span><span class="num">0-0</span>
     <span style="background:var(--red);color:#fff;font-family:var(--mono);font-weight:700;font-size:8px;letter-spacing:.5px;border-radius:4px;padding:2px 5px">LIVE</span></span>`],

 ["2","Score turns green",`<i>— the live number itself is green; no extra element</i>`,
   `<span class="tok"><span class="lab mlbc">MLB</span><span class="num" style="color:var(--liveg)">0-0</span></span>`],

 ["3","Dot + LIVE word",`<i>— pip plus the word, more explicit than a bare dot</i>`,
   `<span class="tok"><span class="lab mlbc">MLB</span><span class="num">0-0</span>
     <span class="pip"></span><span class="mono" style="color:var(--liveg);font-size:9px;font-weight:700;letter-spacing:.4px">LIVE</span></span>`],

 ["4","Pulsing halo dot",`<i>— dot in a soft ring that pulses; draws the eye without text</i>`,
   `<span class="tok"><span class="lab mlbc">MLB</span><span class="num">0-0</span>
     <span style="position:relative;display:inline-flex;width:14px;height:14px;align-items:center;justify-content:center">
       <span style="position:absolute;width:14px;height:14px;border-radius:50%;background:rgba(63,185,80,.25)"></span>
       <span class="pip"></span></span></span>`],

 ["5","Live underline",`<i>— a green underline under the live score (rhymes with the gold tab underline)</i>`,
   `<span class="tok"><span class="lab mlbc">MLB</span>
     <span style="display:inline-flex;flex-direction:column;align-items:center">
       <span class="num">0-0</span>
       <span style="height:2px;width:100%;background:var(--liveg);border-radius:2px;margin-top:2px"></span></span></span>`],
];
document.getElementById("g").innerHTML = ideas.map(([n,name,desc,slot])=>`
  <div class="cell"><div class="cap">OPTION ${n} — <b>${name}</b> ${desc}</div>${ROW(slot)}</div>`).join("");
</script>
</body></html>
