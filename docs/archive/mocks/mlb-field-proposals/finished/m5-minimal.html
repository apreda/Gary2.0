<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLB Field — Minimal</title>
<!--
  m5-minimal — Field-forward MLB lineup. Quiet, premium, one accent.
  Accurate fan-shaped ballpark (American Family Field), mowing stripes, warning track,
  curved outfield wall, infield dirt diamond, mound, bases. 9 fielders as tiny clean
  chips (number + name + position + heat dot + one advanced stat). SEASON · vs RHP · vs
  Bibee split re-stats everyone; Projected/Confirmed state flags platoon-uncertain slots.
  No batting-order rail — order spot lives inside the tap-a-fielder card.
-->
<style>
  :root{
    /* near-monochrome dark; ONE accent = a calm pale-gold */
    --bg:#0B0F0D;--ink:#EDF0EC;--ink2:rgba(237,240,236,.58);--ink3:rgba(237,240,236,.34);--ink4:rgba(237,240,236,.18);
    --line:rgba(237,240,236,.08);--line2:rgba(237,240,236,.14);
    --accent:#D8C58A;            /* the single accent */
    --accentSoft:rgba(216,197,138,.12);
    --navy:#0C2340;--brewersGold:#FFC52F;
    /* field — muted, premium, low-chroma */
    --g1:#23402E;--g2:#1D3626;--g3:#16291D;--stripe:#27462F;
    --dirt:#6E4A2E;--dirt2:#7C5436;--track:#5C3C24;
    /* heat — desaturated so the field stays quiet */
    --hot:#D6764C;--cold:#6FA6CE;--steady:#7C8A80;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#050706;font-family:var(--sans);color:var(--ink);display:flex;justify-content:center;padding:22px 10px 70px;min-height:100vh}
  .phone{width:430px;max-width:100%;background:linear-gradient(180deg,#0E1411,var(--bg));border-radius:34px;overflow:hidden;border:1px solid var(--line2);box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .statusbar{height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:11px;font-weight:600;font-family:var(--mono);color:var(--ink3)}

  /* header — quiet, lots of air */
  .head{padding:8px 22px 0}
  .head .lg{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.22em;color:var(--ink3);text-transform:uppercase}
  .head .mt{margin-top:9px;font-size:25px;font-weight:600;letter-spacing:-.02em;line-height:1.05}
  .head .mt .at{color:var(--ink4);font-weight:400;font-size:17px;margin:0 6px}
  .head .park{margin-top:7px;font-size:12px;font-weight:500;color:var(--ink3);letter-spacing:.01em}

  /* opposing pitcher — a single hairline row, no boxes */
  .sp{display:flex;align-items:center;gap:12px;margin:18px 22px 0;padding:0 0 16px;border-bottom:1px solid var(--line)}
  .sp .disc{width:36px;height:36px;border-radius:50%;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:13px;color:var(--ink);flex:0 0 auto}
  .sp .who{font-size:14px;font-weight:600;letter-spacing:-.01em}
  .sp .l{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:2px;letter-spacing:.02em}
  .sp .hand{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.06em}

  /* controls — state on the left (text), split on the right (text), all very quiet */
  .controls{display:flex;align-items:center;justify-content:space-between;margin:16px 22px 0}
  .state{display:flex;gap:16px}
  .state .t{font-size:12.5px;font-weight:500;color:var(--ink3);cursor:pointer;letter-spacing:.01em;transition:color .15s}
  .state .t.on{font-weight:600;color:var(--ink)}
  .state .t.on::after{content:"";display:block;height:1px;background:var(--accent);margin-top:4px;opacity:.8}
  .splits{display:flex;gap:18px}
  .splits button{border:0;background:transparent;padding:0;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--ink3);cursor:pointer;text-transform:uppercase;transition:color .15s}
  .splits button.on{color:var(--accent)}

  /* field — the hero; let it breathe */
  .fieldwrap{position:relative;margin:14px 16px 0}
  .fieldwrap svg{display:block;width:100%}
  .pl{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;z-index:2}
  /* tiny clean chip — flat, hairline, no glass blur, minimal footprint */
  .chip{position:relative;display:flex;align-items:center;gap:5px;padding:2px 7px 2px 3px;border-radius:13px;
    background:rgba(11,15,13,.72);border:1px solid var(--line2);box-shadow:0 2px 8px rgba(0,0,0,.45)}
  .chip .no{width:18px;height:18px;border-radius:50%;background:rgba(237,240,236,.07);color:var(--ink);font-family:var(--mono);font-weight:700;font-size:9.5px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;border:1px solid var(--line)}
  .chip .st{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink);min-width:26px;text-align:center;letter-spacing:-.01em}
  .chip .dot{position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;border:1.5px solid var(--bg)}
  .nm{font-size:9.5px;font-weight:600;color:var(--ink);text-shadow:0 1px 3px rgba(0,0,0,.85);letter-spacing:.01em}
  .pos{font-family:var(--mono);font-size:7.5px;font-weight:600;color:var(--ink3);letter-spacing:.06em;text-shadow:0 1px 2px rgba(0,0,0,.8)}
  /* projected — dashed hairline + faint accent flag */
  .pl.proj .chip{border-style:dashed;border-color:rgba(216,197,138,.5)}
  .pl.proj .ptag{position:absolute;bottom:-13px;font-family:var(--mono);font-size:7px;font-weight:700;color:var(--accent);letter-spacing:.06em;opacity:.85}

  /* legend + showing — single quiet line */
  .meta{display:flex;align-items:center;justify-content:space-between;margin:16px 22px 0}
  .legend{display:flex;gap:13px;font-family:var(--mono);font-size:9px;color:var(--ink3);letter-spacing:.04em}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:6px;height:6px;border-radius:50%;display:inline-block}
  .statlbl{font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;font-weight:600}

  .foot{text-align:center;font-family:var(--mono);font-size:9px;color:var(--ink4);padding:26px 16px 22px;letter-spacing:.16em;text-transform:uppercase}

  /* sheet */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:.22s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:50%;bottom:0;transform:translate(-50%,103%);width:430px;max-width:100%;background:#0D1310;border-radius:26px 26px 0 0;
    border-top:1px solid var(--line2);padding:8px 22px 32px;z-index:41;transition:transform .26s cubic-bezier(.3,.9,.3,1)}
  .sheet.show{transform:translate(-50%,0)}
  .grab{width:34px;height:4px;border-radius:2px;background:var(--ink4);margin:8px auto 18px}
  .sh-head{display:flex;align-items:center;gap:13px}
  .sh-no{width:44px;height:44px;border-radius:50%;border:1px solid var(--line2);color:var(--ink);font-family:var(--mono);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:16px}
  .sh-nm{font-size:19px;font-weight:600;letter-spacing:-.01em}
  .sh-sub{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:3px;letter-spacing:.02em}
  /* batting-order spot — the accent moment in the card */
  .sh-spot{margin-left:auto;text-align:right}
  .sh-spot .ord{font-size:22px;font-weight:600;color:var(--accent);letter-spacing:-.02em;line-height:1}
  .sh-spot .ordl{font-family:var(--mono);font-size:8px;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
  .sh-heat{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em}
  .sh-heat i{width:7px;height:7px;border-radius:50%}

  .sh-sec{margin-top:22px}
  .sh-l{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--ink3);font-weight:700;text-transform:uppercase;margin-bottom:12px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
  .cell{text-align:center;padding:0 8px;position:relative}
  .cell+.cell::before{content:"";position:absolute;left:0;top:4px;bottom:4px;width:1px;background:var(--line)}
  .cell .v{font-family:var(--mono);font-size:19px;font-weight:700;letter-spacing:-.01em}
  .cell .k{font-family:var(--mono);font-size:8px;letter-spacing:.06em;color:var(--ink3);margin-top:5px;text-transform:uppercase}
  .splitrow{display:flex;align-items:center;padding:11px 0;border-top:1px solid var(--line);font-size:13px}
  .splitrow:first-child{border-top:0}
  .splitrow .k{color:var(--ink2)}.splitrow .v{margin-left:auto;font-family:var(--mono);font-weight:700;color:var(--ink)}
  .splitrow .v.hl{color:var(--accent)}
  .bvp{font-size:12.5px;line-height:1.6;color:var(--ink2)}
  .bvp b{color:var(--accent);font-weight:700}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span>9:41</span><span>Gary · MLB</span></div>
  <div class="head">
    <div class="lg">Game Intel</div>
    <div class="mt">Cleveland <span class="at">@</span> Milwaukee</div>
    <div class="park">American Family Field · Roof closed · 7:10 PM</div>
  </div>

  <div class="sp">
    <div class="disc">28</div>
    <div><div class="who">Tanner Bibee</div><div class="l">CLE · 3.41 ERA · 28% K · 1.09 WHIP</div></div>
    <div class="hand">RHP</div>
  </div>

  <div class="controls">
    <div class="state">
      <span class="t" data-state="projected">Projected</span>
      <span class="t on" data-state="confirmed">Confirmed</span>
    </div>
    <div class="splits" id="splits">
      <button data-split="season">Season</button>
      <button data-split="hand" class="on">vs RHP</button>
      <button data-split="bvp">vs Bibee</button>
    </div>
  </div>

  <div class="fieldwrap" id="fieldwrap">
    <svg viewBox="0 0 400 440" id="fieldsvg">
      <defs>
        <radialGradient id="grass" cx="50%" cy="94%" r="100%">
          <stop offset="0%" stop-color="#26452F"/><stop offset="50%" stop-color="#1F3927"/><stop offset="100%" stop-color="#142519"/>
        </radialGradient>
        <radialGradient id="vig" cx="50%" cy="60%" r="75%">
          <stop offset="60%" stop-color="rgba(0,0,0,0)"/><stop offset="100%" stop-color="rgba(0,0,0,.4)"/>
        </radialGradient>
        <clipPath id="fair"><path d="M200,394 L36,148 Q200,46 364,148 Z"/></clipPath>
      </defs>
      <rect x="0" y="0" width="400" height="440" fill="#0A1410"/>

      <!-- fair territory wedge -->
      <path d="M200,394 L36,148 Q200,46 364,148 Z" fill="url(#grass)"/>

      <!-- mowing stripes: alternating radial wedges fanning from home -->
      <g clip-path="url(#fair)" opacity=".5">
        <path d="M200,394 L36,148 A 999 999 0 0 1 90,110 Z" fill="#27462F"/>
        <path d="M200,394 L144,124 A 999 999 0 0 1 200,114 Z" fill="#27462F"/>
        <path d="M200,394 L256,124 A 999 999 0 0 1 310,140 Z" fill="#27462F"/>
        <path d="M200,394 L364,148 A 999 999 0 0 0 322,116 Z" fill="#27462F"/>
      </g>

      <!-- warning track (dirt band hugging the wall) + outfield wall arc -->
      <path d="M36,148 Q200,46 364,148" fill="none" stroke="var(--track,#5C3C24)" stroke-width="10" opacity=".9"/>
      <path d="M36,148 Q200,46 364,148" fill="none" stroke="#0A1B11" stroke-width="3"/>

      <!-- foul lines -->
      <line x1="200" y1="394" x2="36" y2="148" stroke="rgba(237,240,236,.4)" stroke-width="1.4"/>
      <line x1="200" y1="394" x2="364" y2="148" stroke="rgba(237,240,236,.4)" stroke-width="1.4"/>
      <!-- foul poles -->
      <circle cx="36" cy="148" r="2.6" fill="#D8C58A"/><circle cx="364" cy="148" r="2.6" fill="#D8C58A"/>

      <!-- infield dirt skin (arc) -->
      <path d="M200,394 L260,334 A 84 84 0 0 0 140,334 Z" fill="#6E4A2E"/>
      <!-- infield grass diamond -->
      <path d="M200,390 L252,338 L200,300 L148,338 Z" fill="#1F3F2B"/>
      <!-- basepaths -->
      <path d="M200,390 L252,338 L200,300 L148,338 Z" fill="none" stroke="#7C5436" stroke-width="5"/>
      <!-- mound -->
      <circle cx="200" cy="348" r="10" fill="#7C5436"/><circle cx="200" cy="348" r="2.2" fill="rgba(255,255,255,.6)"/>
      <!-- bases -->
      <rect x="248" y="334" width="7" height="7" transform="rotate(45 252 338)" fill="#EDF0EC"/>
      <rect x="196.5" y="296.5" width="7" height="7" transform="rotate(45 200 300)" fill="#EDF0EC"/>
      <rect x="144.5" y="334.5" width="7" height="7" transform="rotate(45 148 338)" fill="#EDF0EC"/>
      <!-- home plate -->
      <path d="M195.5,391 l9,0 l0,3.5 l-4.5,3.5 l-4.5,-3.5 z" fill="#EDF0EC"/>

      <!-- soft vignette to recess the corners -->
      <rect x="0" y="0" width="400" height="440" fill="url(#vig)"/>
    </svg>
    <!-- fielder chips injected by JS -->
  </div>

  <div class="meta">
    <div class="legend">
      <span><i style="background:var(--hot)"></i>Hot</span>
      <span><i style="background:var(--cold)"></i>Cold</span>
      <span><i style="background:var(--steady)"></i>Steady</span>
    </div>
    <div class="statlbl" id="statlbl">OPS vs RHP</div>
  </div>

  <div class="foot">Pitching · Bats · Park &amp; Weather below</div>
</div>

<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>

<script>
// pos: field % (x,y). stats per split. bvp = vs Bibee. heat: hot/cold/steady. proj=platoon-uncertain. ord=batting-order spot.
const P = [
  {n:51,nm:'Peralta',pos:'P',x:50,y:79,heat:'steady',pitcher:true,line:'2.90 ERA · 2.71 xERA · 31% K',season:'2.90',hand:'2.71',bvp:'—'},
  {n:24,nm:'Contreras',pos:'C',ord:4,x:50,y:91,heat:'hot',wrc:130,xwoba:'.372',vR:'.910',vL:'.840',bvp:{ab:11,h:4,hr:1,ops:'1.090'},form:'1.180 OPS L15'},
  {n:12,nm:'Hoskins',pos:'1B',ord:5,x:64,y:76,heat:'steady',wrc:112,xwoba:'.345',vR:'.840',vL:'.910',bvp:{ab:8,h:2,hr:0,ops:'.625'},form:'.760 OPS L15'},
  {n:0,nm:'Turang',pos:'2B',ord:1,x:57,y:67,heat:'cold',wrc:95,xwoba:'.300',vR:'.720',vL:'.760',bvp:{ab:6,h:1,hr:0,ops:'.500'},form:'.540 OPS L15'},
  {n:27,nm:'Adames',pos:'SS',ord:9,x:43,y:67,heat:'hot',wrc:118,xwoba:'.350',vR:'.860',vL:'.900',bvp:{ab:13,h:5,hr:1,ops:'.980'},form:'1.020 OPS L15'},
  {n:3,nm:'Ortiz',pos:'3B',ord:7,x:36,y:76,heat:'steady',wrc:88,xwoba:'.298',vR:'.700',vL:'.770',bvp:{ab:5,h:1,hr:0,ops:'.560'},form:'.690 OPS L15'},
  {n:5,nm:'Mitchell',pos:'LF',ord:8,x:27,y:41,heat:'hot',wrc:105,xwoba:'.330',vR:'.800',vL:'.690',bvp:{ab:4,h:2,hr:0,ops:'1.000'},form:'.940 OPS L15',proj:true},
  {n:11,nm:'Chourio',pos:'CF',ord:3,x:50,y:27,heat:'hot',wrc:122,xwoba:'.358',vR:'.880',vL:'.910',bvp:{ab:7,h:3,hr:1,ops:'1.140'},form:'1.060 OPS L15'},
  {n:10,nm:'Frelick',pos:'RF',ord:2,x:72,y:41,heat:'cold',wrc:92,xwoba:'.305',vR:'.740',vL:'.700',bvp:{ab:9,h:2,hr:0,ops:'.560'},form:'.610 OPS L15'},
];

const ord = n => ({1:'1st',2:'2nd',3:'3rd',4:'4th',5:'5th',6:'6th',7:'7th',8:'8th',9:'9th'}[n]||n+'th');
const heatColor = h => h==='hot'?'var(--hot)':h==='cold'?'var(--cold)':'var(--steady)';
let split='hand', state='confirmed';

function statFor(p){
  if(p.pitcher) return p[split==='season'?'season':split==='hand'?'hand':'bvp'] || '—';
  if(split==='season') return p.xwoba;     // xwOBA (advanced)
  if(split==='hand') return p.vR;          // Bibee is RHP → vs RHP OPS
  return p.bvp.h+'-'+p.bvp.ab;             // BvP hits-AB
}
function statLabel(){
  return split==='season'?'xwOBA · season':split==='hand'?'OPS vs RHP':'H-AB vs Bibee';
}
function render(){
  const wrap=document.getElementById('fieldwrap');
  [...wrap.querySelectorAll('.pl')].forEach(e=>e.remove());
  P.forEach(p=>{
    const el=document.createElement('div');
    el.className='pl'+(p.proj && state==='projected'?' proj':'');
    el.style.left=p.x+'%'; el.style.top=p.y+'%';
    const ptag = (p.proj && state==='projected')?'<span class="ptag">PLATOON ?</span>':'';
    el.innerHTML=`<div class="chip"><span class="dot" style="background:${heatColor(p.heat)}"></span>
      <span class="no">${p.n}</span><span class="st">${statFor(p)}</span></div>
      <div class="nm">${p.nm}</div><div class="pos">${p.pos}</div>${ptag}`;
    el.onclick=()=>openSheet(p);
    wrap.appendChild(el);
  });
  document.getElementById('statlbl').textContent=statLabel();
}
function openSheet(p){
  if(p.pitcher) return;
  const sheet=document.getElementById('sheet');
  const heatTxt = p.heat==='hot'?'HOT · L15':p.heat==='cold'?'COLD · L15':'STEADY · L15';
  const heatStyle = `style="color:${heatColor(p.heat)}"`;
  sheet.innerHTML=`<div class="grab"></div>
    <div class="sh-head"><div class="sh-no">${p.n}</div>
      <div><div class="sh-nm">${p.nm}</div><div class="sh-sub">Brewers · ${p.pos}</div>
        <div class="sh-heat" ${heatStyle}><i style="background:${heatColor(p.heat)}"></i>${heatTxt} · ${p.form.split(' ')[0]} OPS</div>
      </div>
      <div class="sh-spot"><div class="ord">${ord(p.ord)}</div><div class="ordl">Bats</div></div>
    </div>
    <div class="sh-sec"><div class="sh-l">The numbers</div>
      <div class="grid3">
        <div class="cell"><div class="v">${p.wrc}</div><div class="k">wRC+</div></div>
        <div class="cell"><div class="v">${p.xwoba}</div><div class="k">xwOBA</div></div>
        <div class="cell"><div class="v" style="color:${heatColor(p.heat)}">${p.form.split(' ')[0]}</div><div class="k">L15 OPS</div></div>
      </div></div>
    <div class="sh-sec"><div class="sh-l">Platoon splits</div>
      <div class="splitrow"><span class="k">vs RHP</span><span class="v hl">${p.vR}</span></div>
      <div class="splitrow"><span class="k">vs LHP</span><span class="v">${p.vL}</span></div></div>
    <div class="sh-sec"><div class="sh-l">vs Tanner Bibee · career</div>
      <div class="bvp">${p.bvp.h}-for-${p.bvp.ab}${p.bvp.hr?`, <b>${p.bvp.hr} HR</b>`:''} · <b>${p.bvp.ops} OPS</b> — small sample, but the read against tonight's arm.</div></div>`;
  sheet.classList.add('show'); document.getElementById('scrim').classList.add('show');
}
function closeSheet(){document.getElementById('sheet').classList.remove('show');document.getElementById('scrim').classList.remove('show');}
document.querySelectorAll('#splits button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#splits button').forEach(x=>x.classList.remove('on'));b.classList.add('on');split=b.dataset.split;render();});
document.querySelectorAll('.state .t').forEach(b=>b.onclick=()=>{document.querySelectorAll('.state .t').forEach(x=>x.classList.remove('on'));b.classList.add('on');state=b.dataset.state;render();});
render();
</script>
</body>
</html>
