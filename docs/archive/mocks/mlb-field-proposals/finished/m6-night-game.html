<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLB Field — Night Game</title>
<!--
  m6-night-game — Stadium-lights aesthetic. Darkest field on the dark page, glowing
  fielder chips lit by overhead light-pools, a night-broadcast mood. Accurate fan-shaped
  ballpark (American Family Field), 9 fielders at real positions with HOT/COLD + one
  advanced stat. SEASON · vs RHP · vs Bibee split toggle, Projected/Confirmed state.
  Batting-order rail removed — the batting-order SPOT lives inside the tap-a-fielder card.
-->
<style>
  :root{
    --bg:#04070A;--panel:rgba(255,255,255,.045);--line:rgba(255,255,255,.08);
    --ink:#EAF1F6;--ink2:rgba(234,241,246,.62);--ink3:rgba(234,241,246,.36);
    --gold:#E7C24B;--navy:#0C2340;--brewersGold:#FFC52F;
    --hot:#FF6A3C;--cold:#4FB6FF;
    --lite:#F4F0D8;            /* stadium light tint */
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#010204;font-family:var(--sans);color:var(--ink);display:flex;justify-content:center;padding:20px 10px 60px;min-height:100vh}
  .phone{width:430px;max-width:100%;position:relative;
    background:radial-gradient(135% 50% at 50% -6%,#0b1a26 0%,#05090e 46%,var(--bg) 100%);
    border-radius:32px;overflow:hidden;border:1px solid var(--line);
    box-shadow:0 0 0 1px rgba(255,255,255,.02),0 30px 80px rgba(0,0,0,.7)}
  /* faint horizon glow of distant light banks at the top */
  .phone::before{content:"";position:absolute;top:0;left:0;right:0;height:120px;pointer-events:none;
    background:radial-gradient(60% 100% at 20% 0%,rgba(244,240,216,.07),transparent 70%),
               radial-gradient(60% 100% at 80% 0%,rgba(244,240,216,.07),transparent 70%);z-index:0}
  .phone>*{position:relative;z-index:1}

  .statusbar{height:32px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:11px;font-weight:600;font-family:var(--mono);color:var(--ink2)}
  .statusbar .live{display:inline-flex;align-items:center;gap:5px;color:var(--gold)}
  .statusbar .live i{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  .head{padding:6px 20px 2px}
  .head .lg{font-family:var(--mono);font-size:10.5px;font-weight:800;letter-spacing:.16em;color:var(--gold);text-transform:uppercase}
  .head .mt{margin-top:6px;font-size:25px;font-weight:800;letter-spacing:-.02em}
  .head .mt .at{color:var(--ink3);font-weight:600;font-size:15px;margin:0 5px}
  .head .park{margin-top:4px;font-size:12px;font-weight:600;color:var(--ink2);display:flex;align-items:center;gap:7px}
  .head .park .bulb{display:inline-flex;align-items:center;gap:4px;color:var(--gold);font-family:var(--mono);font-size:10px;font-weight:800;letter-spacing:.04em}
  .head .park .bulb::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--lite);box-shadow:0 0 7px 1px rgba(244,240,216,.8)}

  /* opposing pitcher banner */
  .sp{display:flex;align-items:center;gap:11px;margin:12px 18px 0;
    background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.02));
    border:1px solid var(--line);border-radius:14px;padding:10px 13px}
  .sp .disc{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#5a3346,#2c1722);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:800;font-size:13px;color:#fff;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(255,255,255,.1)}
  .sp .who{font-size:14px;font-weight:800}.sp .l{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:2px}
  .sp .hand{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:800;color:var(--gold);background:rgba(231,194,75,.12);border:1px solid rgba(231,194,75,.3);padding:5px 10px;border-radius:8px}

  /* state + split toggles */
  .toggles{display:flex;align-items:center;gap:16px;margin:14px 24px 0}
  .toggles .t{font-size:14px;font-weight:500;color:var(--ink3);cursor:pointer;transition:.15s}
  .toggles .t.on{font-weight:800;color:var(--ink)}
  .toggles .t.on::after{content:"";display:block;height:2px;margin-top:3px;border-radius:2px;background:var(--gold);box-shadow:0 0 8px var(--gold)}
  .splits{display:flex;gap:5px;margin:12px 18px 0;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:4px}
  .splits button{flex:1;border:0;background:transparent;padding:9px 4px;border-radius:9px;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.04em;color:var(--ink2);cursor:pointer;transition:.15s}
  .splits button.on{background:linear-gradient(180deg,#fbf7e2,#e7dca8);color:#0a0d10;box-shadow:0 0 16px rgba(244,240,216,.28)}

  /* field */
  .fieldwrap{position:relative;margin:14px 16px 0;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.07);
    box-shadow:inset 0 0 60px rgba(0,0,0,.7),0 18px 40px rgba(0,0,0,.5)}
  .fieldwrap svg{display:block;width:100%}
  /* four overhead light pools cast onto the field */
  .lightpools{position:absolute;inset:0;pointer-events:none;z-index:1;mix-blend-mode:screen;
    background:
      radial-gradient(34% 30% at 26% 18%,rgba(244,240,216,.16),transparent 70%),
      radial-gradient(34% 30% at 74% 18%,rgba(244,240,216,.16),transparent 70%),
      radial-gradient(40% 34% at 50% 60%,rgba(244,240,216,.18),transparent 72%),
      radial-gradient(38% 30% at 50% 95%,rgba(244,240,216,.12),transparent 70%)}

  .pl{position:absolute;transform:translate(-50%,-50%);width:80px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;z-index:3}
  /* a soft pool of light under each lit player */
  .pl::before{content:"";position:absolute;top:-2px;width:52px;height:30px;border-radius:50%;
    background:radial-gradient(50% 50% at 50% 50%,rgba(244,240,216,.22),transparent 72%);filter:blur(2px);z-index:-1}
  .chip{position:relative;display:flex;align-items:center;gap:5px;padding:3px 8px 3px 4px;border-radius:22px;
    background:linear-gradient(180deg,rgba(22,30,38,.82),rgba(9,14,19,.86));
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.28);
    box-shadow:0 0 0 1px rgba(0,0,0,.4),0 6px 16px rgba(0,0,0,.6),0 0 14px rgba(244,240,216,.16),inset 0 1px 0 rgba(255,255,255,.18)}
  .chip .no{width:23px;height:23px;border-radius:50%;background:radial-gradient(circle at 35% 28%,#13386a,var(--navy));color:var(--brewersGold);font-family:var(--mono);font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(255,197,47,.25)}
  .chip .st{font-family:var(--mono);font-size:11px;font-weight:800;color:#fff;min-width:30px;text-align:center;text-shadow:0 0 8px rgba(244,240,216,.35)}
  .chip .flame{position:absolute;top:-5px;right:-3px;width:12px;height:12px;border-radius:50%;border:1.5px solid var(--bg)}
  .nm{font-size:10.5px;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 8px rgba(244,240,216,.2)}
  .pos{font-family:var(--mono);font-size:8px;font-weight:700;color:rgba(244,240,216,.7);text-shadow:0 1px 3px rgba(0,0,0,.9)}
  .pl.proj .chip{border-style:dashed;border-color:rgba(231,194,75,.6);opacity:.95}
  .pl.proj .ptag{position:absolute;bottom:-13px;font-family:var(--mono);font-size:7px;font-weight:800;color:#0a0d10;background:linear-gradient(180deg,#fbf7e2,#e7dca8);padding:1px 5px;border-radius:5px;box-shadow:0 0 10px rgba(244,240,216,.3)}

  .legend{display:flex;gap:16px;justify-content:center;margin:11px 0 0;font-family:var(--mono);font-size:9.5px;color:var(--ink3)}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block}
  .statlbl{text-align:center;font-family:var(--mono);font-size:9.5px;color:var(--gold);margin-top:8px;letter-spacing:.06em;opacity:.85}

  .foot{text-align:center;font-family:var(--mono);font-size:9px;color:var(--ink3);padding:20px 16px;letter-spacing:.1em;text-transform:uppercase}

  /* sheet */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.62);opacity:0;pointer-events:none;transition:.2s;z-index:40;backdrop-filter:blur(2px)}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:50%;bottom:0;transform:translate(-50%,103%);width:430px;max-width:100%;
    background:radial-gradient(120% 60% at 50% 0%,#0e1a24,#070b10);border-radius:24px 24px 0 0;
    border-top:1px solid rgba(255,255,255,.1);padding:8px 20px 30px;z-index:41;
    box-shadow:0 -20px 60px rgba(0,0,0,.6),0 0 50px rgba(244,240,216,.05);
    transition:transform .26s cubic-bezier(.3,.9,.3,1)}
  .sheet.show{transform:translate(-50%,0)}
  .grab{width:38px;height:4px;border-radius:2px;background:rgba(255,255,255,.22);margin:6px auto 15px}
  .sh-head{display:flex;align-items:center;gap:12px}
  .sh-no{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 35% 28%,#13386a,var(--navy));color:var(--brewersGold);font-family:var(--mono);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:inset 0 0 0 1px rgba(255,197,47,.25),0 0 16px rgba(255,197,47,.12)}
  .sh-nm{font-size:19px;font-weight:800;letter-spacing:-.01em}.sh-sub{font-family:var(--mono);font-size:10.5px;color:var(--ink3);margin-top:2px}
  .sh-tag{margin-left:auto;font-family:var(--mono);font-size:9.5px;font-weight:800;padding:5px 10px;border-radius:9px}
  /* batting-order spot pill — lives in the card now (no rail) */
  .bat-spot{margin-top:14px;display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:14px;
    background:linear-gradient(180deg,rgba(231,194,75,.12),rgba(231,194,75,.04));border:1px solid rgba(231,194,75,.28);
    box-shadow:0 0 24px rgba(231,194,75,.08)}
  .bat-spot .ord{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:800;font-size:17px;color:#0a0d10;background:linear-gradient(180deg,#fbf7e2,#e7c24b);box-shadow:0 0 16px rgba(231,194,75,.35)}
  .bat-spot .txt b{font-size:13.5px;font-weight:800;color:var(--gold)}
  .bat-spot .txt .s{font-family:var(--mono);font-size:9.5px;color:var(--ink3);margin-top:1px;letter-spacing:.04em}
  .sh-sec{margin-top:17px}.sh-l{font-family:var(--mono);font-size:9px;letter-spacing:.13em;color:var(--gold);font-weight:800;text-transform:uppercase;margin-bottom:9px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .cell{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:11px;text-align:center}
  .cell .v{font-family:var(--mono);font-size:17px;font-weight:800;text-shadow:0 0 10px rgba(244,240,216,.18)}.cell .k{font-family:var(--mono);font-size:8px;letter-spacing:.06em;color:var(--ink3);margin-top:4px}
  .splitrow{display:flex;align-items:center;padding:10px 0;border-top:1px solid var(--line);font-size:13px}
  .splitrow:first-child{border-top:0}.splitrow .k{color:var(--ink2)}.splitrow .v{margin-left:auto;font-family:var(--mono);font-weight:800}
  .bvp{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:13px;padding:13px 14px;font-size:13px;line-height:1.55}
  .bvp b{color:var(--gold)}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span>9:41</span><span class="live"><i></i>NIGHT · MLB</span></div>
  <div class="head">
    <div class="lg">MLB · Game Intel</div>
    <div class="mt">Cleveland <span class="at">@</span> Milwaukee</div>
    <div class="park">American Family Field · 7:10 PM <span class="bulb">LIGHTS ON</span></div>
  </div>

  <div class="sp">
    <div class="disc">28</div>
    <div><div class="who">Tanner Bibee</div><div class="l">CLE · 3.41 ERA · 28% K · 1.09 WHIP</div></div>
    <div class="hand">RHP</div>
  </div>

  <div class="toggles">
    <span class="t" data-state="projected">Projected</span>
    <span class="t on" data-state="confirmed">Confirmed</span>
  </div>
  <div class="splits" id="splits">
    <button data-split="season">SEASON</button>
    <button data-split="hand" class="on">vs RHP</button>
    <button data-split="bvp">vs BIBEE</button>
  </div>

  <div class="fieldwrap" id="fieldwrap">
    <svg viewBox="0 0 400 440" id="fieldsvg">
      <defs>
        <!-- night grass: deepest at the walls, faintly lit toward home -->
        <radialGradient id="grass" cx="50%" cy="96%" r="100%">
          <stop offset="0%" stop-color="#16352A"/><stop offset="48%" stop-color="#102A20"/><stop offset="100%" stop-color="#081A12"/>
        </radialGradient>
        <linearGradient id="dirt" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6E4327"/><stop offset="100%" stop-color="#4f3019"/>
        </linearGradient>
        <radialGradient id="moundg" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#8A5631"/><stop offset="100%" stop-color="#5a371d"/>
        </radialGradient>
        <filter id="soft"><feGaussianBlur stdDeviation="1.1"/></filter>
      </defs>
      <rect x="0" y="0" width="400" height="440" fill="#040a07"/>
      <!-- fair territory wedge -->
      <path d="M200,392 L40,150 Q200,52 360,150 Z" fill="url(#grass)"/>
      <!-- mowing stripes (radial arcs from home), dimmed for night -->
      <g opacity="0.45">
        <path d="M200,392 L78,170 Q200,86 322,170 Z" fill="none" stroke="#1f4533" stroke-width="14" opacity=".4"/>
        <path d="M200,392 L120,205 Q200,140 280,205 Z" fill="none" stroke="#1f4533" stroke-width="14" opacity=".4"/>
        <path d="M200,392 L156,235 Q200,196 244,235 Z" fill="none" stroke="#1f4533" stroke-width="13" opacity=".4"/>
      </g>
      <!-- warning track + outfield wall arc -->
      <path d="M40,150 Q200,52 360,150" fill="none" stroke="#5a3a22" stroke-width="10"/>
      <path d="M40,150 Q200,52 360,150" fill="none" stroke="#06140d" stroke-width="3.5"/>
      <!-- wall-top rail catching the lights -->
      <path d="M40,148 Q200,50 360,148" fill="none" stroke="rgba(244,240,216,.18)" stroke-width="1.2"/>
      <!-- foul lines (chalk lit by the lights) -->
      <line x1="200" y1="392" x2="40" y2="150" stroke="rgba(244,240,216,.65)" stroke-width="1.7"/>
      <line x1="200" y1="392" x2="360" y2="150" stroke="rgba(244,240,216,.65)" stroke-width="1.7"/>
      <!-- foul poles glowing -->
      <circle cx="40" cy="150" r="3.4" fill="#ffe27a" filter="url(#soft)"/><circle cx="360" cy="150" r="3.4" fill="#ffe27a" filter="url(#soft)"/>
      <!-- infield dirt skin (arc) -->
      <path d="M200,392 L256,336 A 80 80 0 0 0 144,336 Z" fill="url(#dirt)"/>
      <!-- infield grass diamond -->
      <path d="M200,388 L250,338 L200,300 L150,338 Z" fill="#143226"/>
      <!-- basepaths -->
      <path d="M200,388 L250,338 L200,300 L150,338 Z" fill="none" stroke="#6E4327" stroke-width="6"/>
      <!-- mound -->
      <circle cx="200" cy="348" r="11.5" fill="url(#moundg)"/><circle cx="200" cy="348" r="2.4" fill="rgba(255,255,255,.85)"/>
      <!-- bases lit -->
      <rect x="246" y="334" width="8" height="8" transform="rotate(45 250 338)" fill="#fdfbef"/>
      <rect x="196" y="296" width="8" height="8" transform="rotate(45 200 300)" fill="#fdfbef"/>
      <rect x="146" y="334" width="8" height="8" transform="rotate(45 150 338)" fill="#fdfbef"/>
      <!-- home plate -->
      <path d="M195,389 l10,0 l0,4 l-5,4 l-5,-4 z" fill="#fdfbef"/>
    </svg>
    <div class="lightpools"></div>
    <!-- fielder chips injected by JS -->
  </div>
  <div class="legend">
    <span><i style="background:var(--hot)"></i>Hot (L15)</span>
    <span><i style="background:var(--cold)"></i>Cold</span>
    <span><i style="background:#7a8a80"></i>Steady</span>
  </div>
  <div class="statlbl" id="statlbl">SHOWING · OPS vs RHP</div>

  <div class="foot">Pitching · Bats · Park &amp; Weather modules continue below</div>
</div>

<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>

<script>
// pos: field % (x,y). stats per split. bvp = vs Bibee. heat: hot/cold/steady. proj=platoon-uncertain.
// bo = batting-order spot (now shown inside the tap-a-fielder card, no rail).
const P = [
  {n:51,nm:'Peralta',pos:'P',x:50,y:79,heat:'steady',pitcher:true,line:'2.90 ERA · 2.71 xERA · 31% K',season:'2.90',hand:'2.71',bvp:'—'},
  {n:24,nm:'Contreras',pos:'C',x:50,y:91,heat:'hot',bo:4,wrc:130,xwoba:'.372',vR:'.910',vL:'.840',bvp:{ab:11,h:4,hr:1,ops:'1.090'},form:'1.180 OPS L15'},
  {n:12,nm:'Hoskins',pos:'1B',x:64,y:76,heat:'steady',bo:5,wrc:112,xwoba:'.345',vR:'.840',vL:'.910',bvp:{ab:8,h:2,hr:0,ops:'.625'},form:'.760 OPS L15'},
  {n:0,nm:'Turang',pos:'2B',x:57,y:67,heat:'cold',bo:1,wrc:95,xwoba:'.300',vR:'.720',vL:'.760',bvp:{ab:6,h:1,hr:0,ops:'.500'},form:'.540 OPS L15'},
  {n:27,nm:'Adames',pos:'SS',x:43,y:67,heat:'hot',bo:9,wrc:118,xwoba:'.350',vR:'.860',vL:'.900',bvp:{ab:13,h:5,hr:1,ops:'.980'},form:'1.020 OPS L15'},
  {n:3,nm:'Ortiz',pos:'3B',x:36,y:76,heat:'steady',bo:7,wrc:88,xwoba:'.298',vR:'.700',vL:'.770',bvp:{ab:5,h:1,hr:0,ops:'.560'},form:'.690 OPS L15'},
  {n:5,nm:'Mitchell',pos:'LF',x:27,y:41,heat:'hot',bo:8,wrc:105,xwoba:'.330',vR:'.800',vL:'.690',bvp:{ab:4,h:2,hr:0,ops:'1.000'},form:'.940 OPS L15',proj:true},
  {n:11,nm:'Chourio',pos:'CF',x:50,y:27,heat:'hot',bo:3,wrc:122,xwoba:'.358',vR:'.880',vL:'.910',bvp:{ab:7,h:3,hr:1,ops:'1.140'},form:'1.060 OPS L15'},
  {n:10,nm:'Frelick',pos:'RF',x:72,y:41,heat:'cold',bo:2,wrc:92,xwoba:'.305',vR:'.740',vL:'.700',bvp:{ab:9,h:2,hr:0,ops:'.560'},form:'.610 OPS L15'},
];
const ORD_SUFFIX = n => (n%10===1&&n!==11)?'st':(n%10===2&&n!==12)?'nd':(n%10===3&&n!==13)?'rd':'th';

const heatColor = h => h==='hot'?'var(--hot)':h==='cold'?'var(--cold)':'#7a8a80';
let split='hand', state='confirmed';

function statFor(p){
  if(p.pitcher) return p[split==='season'?'season':split==='hand'?'hand':'bvp'] || '—';
  if(split==='season') return p.xwoba;
  if(split==='hand') return p.vR;          // Bibee is RHP → vs RHP
  return p.bvp.h+'-'+p.bvp.ab;             // BvP hits-AB
}
function statLabel(){
  return split==='season'?'SHOWING · xwOBA (season)':split==='hand'?'SHOWING · OPS vs RHP':'SHOWING · vs Bibee (H-AB)';
}
function render(){
  const wrap=document.getElementById('fieldwrap');
  [...wrap.querySelectorAll('.pl')].forEach(e=>e.remove());
  P.forEach(p=>{
    const el=document.createElement('div');
    el.className='pl'+(p.proj && state==='projected'?' proj':'');
    el.style.left=p.x+'%'; el.style.top=p.y+'%';
    const ptag = (p.proj && state==='projected')?'<span class="ptag">PLATOON ?</span>':'';
    el.innerHTML=`<div class="chip"><span class="flame" style="background:${heatColor(p.heat)};box-shadow:0 0 8px ${heatColor(p.heat)}"></span>
      <span class="no">${p.n}</span><span class="st">${statFor(p)}</span></div>
      <div class="nm">${p.nm}</div><div class="pos">${p.pos}</div>${ptag}`;
    el.onclick=()=>openSheet(p);
    wrap.appendChild(el);
  });
  document.getElementById('statlbl').textContent=statLabel();
}
function openSheet(p){
  if(p.pitcher) return;
  const sheet=document.getElementById('sheet');
  const tag = p.heat==='hot'?'<span class="sh-tag" style="background:rgba(255,106,60,.18);color:#FF6A3C">HOT · L15</span>'
            : p.heat==='cold'?'<span class="sh-tag" style="background:rgba(79,182,255,.18);color:#4FB6FF">COLD · L15</span>':'';
  const ord = p.bo+ORD_SUFFIX(p.bo);
  sheet.innerHTML=`<div class="grab"></div>
    <div class="sh-head"><div class="sh-no">${p.n}</div>
      <div><div class="sh-nm">${p.nm}</div><div class="sh-sub">Brewers · ${p.pos} · ${p.form}</div></div>${tag}</div>
    <div class="bat-spot"><div class="ord">${p.bo}</div>
      <div class="txt"><b>Bats ${ord}</b><div class="s">IN TONIGHT'S ORDER · vs RHP TANNER BIBEE</div></div></div>
    <div class="sh-sec"><div class="sh-l">The numbers</div>
      <div class="grid3">
        <div class="cell"><div class="v">${p.wrc}</div><div class="k">wRC+</div></div>
        <div class="cell"><div class="v">${p.xwoba}</div><div class="k">xwOBA</div></div>
        <div class="cell"><div class="v" style="color:${heatColor(p.heat)}">${p.form.split(' ')[0]}</div><div class="k">L15 OPS</div></div>
      </div></div>
    <div class="sh-sec"><div class="sh-l">Platoon splits</div>
      <div class="splitrow"><span class="k">vs RHP</span><span class="v">${p.vR}</span></div>
      <div class="splitrow"><span class="k">vs LHP</span><span class="v">${p.vL}</span></div></div>
    <div class="sh-sec"><div class="sh-l">vs Tanner Bibee (career)</div>
      <div class="bvp">${p.bvp.h}-for-${p.bvp.ab}${p.bvp.hr?`, <b>${p.bvp.hr} HR</b>`:''} · <b>${p.bvp.ops} OPS</b> — small sample, but the read against tonight's arm.</div></div>`;
  sheet.classList.add('show'); document.getElementById('scrim').classList.add('show');
}
function closeSheet(){document.getElementById('sheet').classList.remove('show');document.getElementById('scrim').classList.remove('show');}
document.querySelectorAll('#splits button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#splits button').forEach(x=>x.classList.remove('on'));b.classList.add('on');split=b.dataset.split;render();});
document.querySelectorAll('.toggles .t').forEach(b=>b.onclick=()=>{document.querySelectorAll('.toggles .t').forEach(x=>x.classList.remove('on'));b.classList.add('on');state=b.dataset.state;render();});
render();
</script>
</body>
</html>
