<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLB — realistic ballpark</title>
<!--
  A REAL ballpark from above (not an abstract diamond): home plate at the bottom, foul
  lines opening at 45 deg to a curved OUTFIELD WALL + warning track, the infield diamond
  in the lower-centre, the outfielders spread across the big outfield. Flat + crisp (no
  slop). Brewers home vs RHP Bibee. HOT/COLD + a stat per spot; tap for the full card.
-->
<style>
  :root{
    --bg:#0B100D;--ink:#F2F4F1;--ink2:rgba(242,244,241,.66);--ink3:rgba(242,244,241,.42);
    --gold:#C9A227;--navy:#0C2340;--brewGold:#FFC52F;
    --grass:#3E7A34;--grass2:#357031;--dirt:#A86B3C;--track:#90572F;--wall:#16301C;--stands:#181B20;
    --hot:#E8643C;--cold:#54A9E8;--steady:#7A8A80;--panel:rgba(255,255,255,.05);--line:rgba(255,255,255,.1);
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#05080a;font-family:var(--sans);color:var(--ink);display:flex;justify-content:center;padding:20px 10px 60px;min-height:100vh}
  .phone{width:430px;max-width:100%;background:radial-gradient(120% 50% at 50% 0%,#10201a,var(--bg));border-radius:30px;overflow:hidden;border:1px solid var(--line)}
  .statusbar{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:11px;font-weight:600;font-family:var(--mono);color:var(--ink2)}
  .head{padding:6px 18px 2px}
  .head .lg{font-family:var(--mono);font-size:10.5px;font-weight:800;letter-spacing:.14em;color:var(--gold);text-transform:uppercase}
  .head .mt{margin-top:5px;font-size:24px;font-weight:800;letter-spacing:-.02em}.head .mt .at{color:var(--ink3);font-weight:600;font-size:15px;margin:0 4px}
  .head .park{margin-top:3px;font-size:12px;font-weight:600;color:var(--ink2)}
  .splits{display:flex;gap:5px;margin:11px 16px 0;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:4px}
  .splits button{flex:1;border:0;background:transparent;padding:8px 4px;border-radius:8px;font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--ink2);cursor:pointer}
  .splits button.on{background:var(--ink);color:#0B100D}

  .fieldwrap{position:relative;margin:12px 12px 0;height:452px}
  .fieldwrap svg{position:absolute;inset:0;width:100%;height:100%}
  .pl{position:absolute;transform:translate(-50%,-50%);width:74px;display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;z-index:2}
  .pl .disc{position:relative;width:27px;height:27px;border-radius:50%;background:var(--navy);color:var(--brewGold);font-family:var(--mono);font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,.25);box-shadow:0 2px 6px rgba(0,0,0,.55)}
  .pl .flame{position:absolute;top:-3px;right:-3px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg)}
  .pl .nm{font-size:10px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);line-height:1.05}
  .pl .ps{font-family:var(--mono);font-size:8.5px;font-weight:800;color:var(--gold);text-shadow:0 1px 2px rgba(0,0,0,.9)}
  .pl.sp .disc{background:#3a2230;color:#fff}

  .legend{display:flex;gap:14px;justify-content:center;margin:6px 0 0;font-family:var(--mono);font-size:9.5px;color:var(--ink3)}
  .legend span{display:inline-flex;align-items:center;gap:5px}.legend i{width:9px;height:9px;border-radius:50%}
  .foot{text-align:center;font-family:var(--mono);font-size:9px;color:var(--ink3);padding:16px;letter-spacing:.08em;text-transform:uppercase}

  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.2s;z-index:40}.scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:50%;bottom:0;transform:translate(-50%,103%);width:430px;max-width:100%;background:#0F1612;border-radius:22px 22px 0 0;border-top:1px solid var(--line);padding:8px 18px 28px;z-index:41;transition:transform .25s cubic-bezier(.3,.9,.3,1)}
  .sheet.show{transform:translate(-50%,0)}
  .grab{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.2);margin:6px auto 14px}
  .sh-head{display:flex;align-items:center;gap:11px}.sh-no{width:42px;height:42px;border-radius:50%;background:var(--navy);color:var(--brewGold);font-family:var(--mono);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:15px}
  .sh-nm{font-size:18px;font-weight:800}.sh-sub{font-family:var(--mono);font-size:10.5px;color:var(--ink3);margin-top:1px}
  .sh-tag{margin-left:auto;font-family:var(--mono);font-size:9.5px;font-weight:800;padding:5px 9px;border-radius:8px}
  .ord{margin-top:13px;display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;color:var(--ink2);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:6px 10px}.ord b{color:var(--gold);font-size:13px}
  .sh-sec{margin-top:14px}.sh-l{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--gold);font-weight:800;text-transform:uppercase;margin-bottom:8px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.cell{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center}.cell .v{font-family:var(--mono);font-size:17px;font-weight:800}.cell .k{font-family:var(--mono);font-size:8px;letter-spacing:.05em;color:var(--ink3);margin-top:3px}
  .splitrow{display:flex;padding:9px 0;border-top:1px solid var(--line);font-size:13px}.splitrow:first-child{border-top:0}.splitrow .k{color:var(--ink2)}.splitrow .v{margin-left:auto;font-family:var(--mono);font-weight:800}
  .bvp{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 13px;font-size:13px;line-height:1.5}.bvp b{color:var(--gold)}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span>9:41</span><span>Gary · MLB</span></div>
  <div class="head">
    <div class="lg">MLB · Game Intel</div>
    <div class="mt">Cleveland <span class="at">@</span> Milwaukee</div>
    <div class="park">American Family Field · 342-400-345 · vs Tanner Bibee (RHP)</div>
  </div>
  <div class="splits" id="splits"><button data-split="season">SEASON</button><button data-split="hand" class="on">vs RHP</button><button data-split="bvp">vs BIBEE</button></div>

  <div class="fieldwrap" id="fieldwrap">
    <svg viewBox="0 0 430 452" preserveAspectRatio="none">
      <!-- stands ring -->
      <path d="M8,222 Q215,-20 422,222 L430,200 Q215,-60 0,200 Z" fill="#181B20"/>
      <!-- fair grass fan: home -> left pole -> wall arc -> right pole -->
      <path d="M215,406 L34,212 Q215,44 396,212 Z" fill="#3E7A34"/>
      <!-- mowing band (flat, subtle) -->
      <path d="M215,406 L96,278 Q215,170 334,278 Z" fill="#357031" opacity=".55"/>
      <!-- warning track (inside the wall) -->
      <path d="M34,212 Q215,44 396,212" fill="none" stroke="#90572F" stroke-width="10"/>
      <!-- outfield wall -->
      <path d="M34,212 Q215,44 396,212" fill="none" stroke="#16301C" stroke-width="3"/>
      <!-- foul lines -->
      <line x1="215" y1="406" x2="34" y2="212" stroke="rgba(255,255,255,.6)" stroke-width="1.5"/>
      <line x1="215" y1="406" x2="396" y2="212" stroke="rgba(255,255,255,.6)" stroke-width="1.5"/>
      <!-- foul poles -->
      <circle cx="34" cy="212" r="3" fill="#ffd34d"/><circle cx="396" cy="212" r="3" fill="#ffd34d"/>
      <!-- infield dirt skin -->
      <path d="M215,406 L292,332 A 78 78 0 0 0 138,332 Z" fill="#A86B3C"/>
      <!-- infield grass -->
      <polygon points="215,394 278,334 215,274 152,334" fill="#3E7A34"/>
      <!-- basepaths -->
      <polygon points="215,394 278,334 215,274 152,334" fill="none" stroke="#c07e4e" stroke-width="4.5"/>
      <!-- mound -->
      <circle cx="215" cy="346" r="9" fill="#c07e4e"/><circle cx="215" cy="346" r="2.2" fill="rgba(255,255,255,.8)"/>
      <!-- bases + home -->
      <rect x="274" y="330" width="8" height="8" transform="rotate(45 278 334)" fill="#fff"/>
      <rect x="211" y="270" width="8" height="8" transform="rotate(45 215 274)" fill="#fff"/>
      <rect x="148" y="330" width="8" height="8" transform="rotate(45 152 334)" fill="#fff"/>
      <path d="M209,403 l12,0 l0,4 l-6,5 l-6,-5 z" fill="#fff"/>
    </svg>
  </div>
  <div class="legend"><span><i style="background:var(--hot)"></i>Hot L15</span><span><i style="background:var(--cold)"></i>Cold</span><span><i style="background:var(--steady)"></i>Steady</span><span>· OPS vs RHP</span></div>
  <div class="foot">Pitching · Bats · Park &amp; Weather modules continue below</div>
</div>

<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>

<script>
// fx,fy = % of fieldwrap. Real defensive alignment, spread to avoid overlap.
const P=[
  {n:11,nm:'Chourio',pos:'CF',x:50,y:21,heat:'hot',ord:3,wrc:122,xwoba:'.358',vR:'.880',vL:'.910',bvp:{ab:7,h:3,hr:1,ops:'1.140'},form:'1.060'},
  {n:5,nm:'Mitchell',pos:'LF',x:22,y:36,heat:'hot',ord:8,wrc:105,xwoba:'.330',vR:'.800',vL:'.690',bvp:{ab:4,h:2,hr:0,ops:'1.000'},form:'.940'},
  {n:10,nm:'Frelick',pos:'RF',x:78,y:36,heat:'cold',ord:2,wrc:92,xwoba:'.305',vR:'.740',vL:'.700',bvp:{ab:9,h:2,hr:0,ops:'.560'},form:'.610'},
  {n:27,nm:'Adames',pos:'SS',x:39,y:57,heat:'hot',ord:9,wrc:118,xwoba:'.350',vR:'.860',vL:'.900',bvp:{ab:13,h:5,hr:1,ops:'.980'},form:'1.020'},
  {n:0,nm:'Turang',pos:'2B',x:61,y:57,heat:'cold',ord:1,wrc:95,xwoba:'.300',vR:'.720',vL:'.760',bvp:{ab:6,h:1,hr:0,ops:'.500'},form:'.540'},
  {n:3,nm:'Ortiz',pos:'3B',x:30,y:76,heat:'steady',ord:7,wrc:88,xwoba:'.298',vR:'.700',vL:'.770',bvp:{ab:5,h:1,hr:0,ops:'.560'},form:'.690'},
  {n:12,nm:'Hoskins',pos:'1B',x:70,y:76,heat:'steady',ord:5,wrc:112,xwoba:'.345',vR:'.840',vL:'.910',bvp:{ab:8,h:2,hr:0,ops:'.625'},form:'.760'},
  {n:51,nm:'Peralta',pos:'SP',x:50,y:77,heat:'steady',sp:true},
  {n:24,nm:'Contreras',pos:'C',x:50,y:93,heat:'hot',ord:4,wrc:130,xwoba:'.372',vR:'.910',vL:'.840',bvp:{ab:11,h:4,hr:1,ops:'1.090'},form:'1.180'},
];
const heatColor=h=>h==='hot'?'var(--hot)':h==='cold'?'var(--cold)':'var(--steady)';
let split='hand';
function statFor(p){ if(p.sp) return 'SP'; if(split==='season')return p.pos+' · '+p.xwoba; if(split==='hand')return p.pos+' · '+p.vR; return p.pos+' · '+p.bvp.h+'-'+p.bvp.ab; }
function render(){
  const w=document.getElementById('fieldwrap'); [...w.querySelectorAll('.pl')].forEach(e=>e.remove());
  P.forEach(p=>{const el=document.createElement('div');el.className='pl'+(p.sp?' sp':'');el.style.left=p.x+'%';el.style.top=p.y+'%';
    const flame=p.sp?'':`<span class="flame" style="background:${heatColor(p.heat)}"></span>`;
    el.innerHTML=`<div class="disc">${flame}${p.n}</div><div class="nm">${p.nm}</div><div class="ps">${statFor(p)}</div>`;
    el.onclick=()=>openSheet(p); w.appendChild(el);});
}
function openSheet(p){ if(p.sp)return; const sheet=document.getElementById('sheet');
  const tag=p.heat==='hot'?'<span class="sh-tag" style="background:rgba(232,100,60,.18);color:#E8643C">HOT · L15</span>':p.heat==='cold'?'<span class="sh-tag" style="background:rgba(84,169,232,.18);color:#54A9E8">COLD · L15</span>':'';
  sheet.innerHTML=`<div class="grab"></div><div class="sh-head"><div class="sh-no">${p.n}</div><div><div class="sh-nm">${p.nm}</div><div class="sh-sub">Brewers · ${p.pos} · ${p.form} OPS L15</div></div>${tag}</div>
    <div class="ord">Bats <b>${p.ord}${p.ord===1?'st':p.ord===2?'nd':p.ord===3?'rd':'th'}</b> in the order</div>
    <div class="sh-sec"><div class="sh-l">The numbers</div><div class="grid3"><div class="cell"><div class="v">${p.wrc}</div><div class="k">wRC+</div></div><div class="cell"><div class="v">${p.xwoba}</div><div class="k">xwOBA</div></div><div class="cell"><div class="v" style="color:${heatColor(p.heat)}">${p.form}</div><div class="k">L15 OPS</div></div></div></div>
    <div class="sh-sec"><div class="sh-l">Platoon splits</div><div class="splitrow"><span class="k">vs RHP</span><span class="v">${p.vR}</span></div><div class="splitrow"><span class="k">vs LHP</span><span class="v">${p.vL}</span></div></div>
    <div class="sh-sec"><div class="sh-l">vs Tanner Bibee (career)</div><div class="bvp">${p.bvp.h}-for-${p.bvp.ab}${p.bvp.hr?`, <b>${p.bvp.hr} HR</b>`:''} · <b>${p.bvp.ops} OPS</b></div></div>`;
  sheet.classList.add('show'); document.getElementById('scrim').classList.add('show'); }
function closeSheet(){document.getElementById('sheet').classList.remove('show');document.getElementById('scrim').classList.remove('show');}
document.querySelectorAll('#splits button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#splits button').forEach(x=>x.classList.remove('on'));b.classList.add('on');split=b.dataset.split;render();});
render();
</script>
</body>
</html>
