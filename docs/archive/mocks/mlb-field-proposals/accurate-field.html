<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLB Field — accurate, hand-built</title>
<!--
  Hand-built MLB lineup field (not agents). Accurate fan-shaped ballpark (American Family
  Field), 9 fielders at real positions as frosted-glass chips (d15) on a dark tactical
  field (d03), each with a HOT/COLD dot + an ADVANCED stat. A SEASON · vs RHP · vs SP
  split toggle re-stats every fielder; a PROJECTED/CONFIRMED state; tap a fielder for the
  full splits + batter-vs-pitcher card (d14).
-->
<style>
  :root{
    --bg:#0E1411;--panel:rgba(255,255,255,.05);--line:rgba(255,255,255,.1);
    --ink:#F2F4F1;--ink2:rgba(242,244,241,.66);--ink3:rgba(242,244,241,.4);
    --gold:#C9A227;--navy:#0C2340;--brewersGold:#FFC52F;
    --grass:#1C3A28;--grass2:#22452F;--grassHi:#28503A;--dirt:#7A4A2A;--dirt2:#8A5631;--track:#6B4326;
    --hot:#E8643C;--cold:#54A9E8;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#05080a;font-family:var(--sans);color:var(--ink);display:flex;justify-content:center;padding:20px 10px 60px;min-height:100vh}
  .phone{width:420px;max-width:100%;background:radial-gradient(120% 60% at 50% 0%,#13201a,var(--bg));border-radius:30px;overflow:hidden;border:1px solid var(--line)}
  .statusbar{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:11px;font-weight:600;font-family:var(--mono);color:var(--ink2)}
  .eyebrow{font-family:var(--mono);font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}

  .head{padding:6px 18px 2px}
  .head .lg{font-family:var(--mono);font-size:10.5px;font-weight:800;letter-spacing:.14em;color:var(--gold);text-transform:uppercase}
  .head .mt{margin-top:5px;font-size:24px;font-weight:800;letter-spacing:-.02em}
  .head .mt .at{color:var(--ink3);font-weight:600;font-size:15px;margin:0 4px}
  .head .park{margin-top:3px;font-size:12px;font-weight:600;color:var(--ink2)}

  /* opposing pitcher banner */
  .sp{display:flex;align-items:center;gap:10px;margin:11px 16px 0;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px 12px}
  .sp .disc{width:34px;height:34px;border-radius:50%;background:#3a2230;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:800;font-size:13px;color:#fff;flex:0 0 auto}
  .sp .who{font-size:13.5px;font-weight:800}.sp .l{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:1px}
  .sp .hand{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:800;color:var(--gold);background:rgba(201,162,39,.14);border:1px solid rgba(201,162,39,.3);padding:4px 9px;border-radius:7px}

  /* state + split toggles */
  .toggles{display:flex;align-items:center;gap:14px;margin:13px 22px 0}
  .toggles .t{font-size:14px;font-weight:500;color:var(--ink3);cursor:pointer}
  .toggles .t.on{font-weight:800;color:var(--ink)}
  .splits{display:flex;gap:5px;margin:11px 16px 0;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:4px}
  .splits button{flex:1;border:0;background:transparent;padding:8px 4px;border-radius:8px;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.03em;color:var(--ink2);cursor:pointer}
  .splits button.on{background:var(--ink);color:#0E1411}

  /* field */
  .fieldwrap{position:relative;margin:12px 14px 0;border-radius:16px;overflow:hidden;border:1px solid var(--line)}
  .fieldwrap svg{display:block;width:100%}
  .pl{position:absolute;transform:translate(-50%,-50%);width:78px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;z-index:2}
  .chip{position:relative;display:flex;align-items:center;gap:5px;padding:3px 7px 3px 4px;border-radius:20px;
    background:rgba(14,22,18,.55);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);border:1px solid rgba(255,255,255,.22);box-shadow:0 3px 10px rgba(0,0,0,.4)}
  .chip .no{width:22px;height:22px;border-radius:50%;background:var(--navy);color:var(--brewersGold);font-family:var(--mono);font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .chip .st{font-family:var(--mono);font-size:11px;font-weight:800;color:#fff;min-width:30px;text-align:center}
  .chip .flame{position:absolute;top:-5px;right:-3px;width:11px;height:11px;border-radius:50%;border:1.5px solid var(--bg)}
  .nm{font-size:10.5px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8)}
  .pos{font-family:var(--mono);font-size:8px;font-weight:700;color:rgba(255,255,255,.65);text-shadow:0 1px 2px rgba(0,0,0,.7)}
  .pl.proj .chip{border-style:dashed;opacity:.92}
  .pl.proj .ptag{position:absolute;bottom:-12px;font-family:var(--mono);font-size:7px;font-weight:800;color:var(--gold);background:rgba(201,162,39,.16);padding:1px 4px;border-radius:4px}

  .legend{display:flex;gap:14px;justify-content:center;margin:10px 0 0;font-family:var(--mono);font-size:9.5px;color:var(--ink3)}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block}
  .statlbl{text-align:center;font-family:var(--mono);font-size:9.5px;color:var(--ink3);margin-top:7px;letter-spacing:.04em}

  /* batting order rail */
  .order{margin:16px 16px 0}
  .order .lbl{font-family:var(--mono);font-size:10px;font-weight:800;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
  .obatter{display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid var(--line)}
  .obatter:first-of-type{border-top:0}
  .obatter .ord{font-family:var(--mono);font-size:11px;font-weight:800;color:var(--ink3);width:14px}
  .obatter .onm{font-size:13px;font-weight:700}.obatter .opos{font-family:var(--mono);font-size:9px;color:var(--ink3);margin-left:5px}
  .obatter .ost{margin-left:auto;font-family:var(--mono);font-size:12px;font-weight:800;color:var(--gold)}
  .obatter .of{width:9px;height:9px;border-radius:50%;margin-left:9px}

  .foot{text-align:center;font-family:var(--mono);font-size:9px;color:var(--ink3);padding:16px;letter-spacing:.08em;text-transform:uppercase}

  /* sheet */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.2s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:50%;bottom:0;transform:translate(-50%,103%);width:420px;max-width:100%;background:#101713;border-radius:22px 22px 0 0;
    border-top:1px solid var(--line);padding:8px 18px 28px;z-index:41;transition:transform .25s cubic-bezier(.3,.9,.3,1)}
  .sheet.show{transform:translate(-50%,0)}
  .grab{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.2);margin:6px auto 14px}
  .sh-head{display:flex;align-items:center;gap:11px}
  .sh-no{width:42px;height:42px;border-radius:50%;background:var(--navy);color:var(--brewersGold);font-family:var(--mono);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:15px}
  .sh-nm{font-size:18px;font-weight:800}.sh-sub{font-family:var(--mono);font-size:10.5px;color:var(--ink3);margin-top:1px}
  .sh-tag{margin-left:auto;font-family:var(--mono);font-size:9.5px;font-weight:800;padding:5px 9px;border-radius:8px}
  .sh-sec{margin-top:16px}.sh-l{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--gold);font-weight:800;text-transform:uppercase;margin-bottom:8px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .cell{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center}
  .cell .v{font-family:var(--mono);font-size:17px;font-weight:800}.cell .k{font-family:var(--mono);font-size:8px;letter-spacing:.05em;color:var(--ink3);margin-top:3px}
  .splitrow{display:flex;align-items:center;padding:9px 0;border-top:1px solid var(--line);font-size:13px}
  .splitrow:first-child{border-top:0}.splitrow .k{color:var(--ink2)}.splitrow .v{margin-left:auto;font-family:var(--mono);font-weight:800}
  .bvp{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 13px;font-size:13px;line-height:1.5}
  .bvp b{color:var(--gold)}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span>9:41</span><span>Gary · MLB</span></div>
  <div class="head">
    <div class="lg">MLB · Game Intel</div>
    <div class="mt">Cleveland <span class="at">@</span> Milwaukee</div>
    <div class="park">American Family Field · Roof closed · 7:10 PM</div>
  </div>

  <div class="sp">
    <div class="disc">28</div>
    <div><div class="who">Tanner Bibee</div><div class="l">CLE · 3.41 ERA · 28% K · 1.09 WHIP</div></div>
    <div class="hand">RHP</div>
  </div>

  <div class="toggles">
    <span class="t" data-state="projected">Projected</span>
    <span class="t on" data-state="confirmed">Confirmed</span>
  </div>
  <div class="splits" id="splits">
    <button data-split="season">SEASON</button>
    <button data-split="hand" class="on">vs RHP</button>
    <button data-split="bvp">vs BIBEE</button>
  </div>

  <div class="fieldwrap" id="fieldwrap">
    <svg viewBox="0 0 400 440" id="fieldsvg">
      <defs>
        <radialGradient id="grass" cx="50%" cy="92%" r="95%">
          <stop offset="0%" stop-color="#28503A"/><stop offset="55%" stop-color="#22452F"/><stop offset="100%" stop-color="#19331F"/>
        </radialGradient>
      </defs>
      <rect x="0" y="0" width="400" height="440" fill="#0c1a12"/>
      <!-- fair territory wedge -->
      <path d="M200,392 L40,150 Q200,52 360,150 Z" fill="url(#grass)"/>
      <!-- mowing stripes (radial arcs from home) -->
      <g opacity="0.5">
        <path d="M200,392 L78,170 Q200,86 322,170 Z" fill="none" stroke="#2b5a3e" stroke-width="14" opacity=".35"/>
        <path d="M200,392 L120,205 Q200,140 280,205 Z" fill="none" stroke="#2b5a3e" stroke-width="14" opacity=".35"/>
      </g>
      <!-- warning track + wall -->
      <path d="M40,150 Q200,52 360,150" fill="none" stroke="var(--track,#6B4326)" stroke-width="9"/>
      <path d="M40,150 Q200,52 360,150" fill="none" stroke="#0a2114" stroke-width="3"/>
      <!-- foul lines -->
      <line x1="200" y1="392" x2="40" y2="150" stroke="rgba(255,255,255,.55)" stroke-width="1.6"/>
      <line x1="200" y1="392" x2="360" y2="150" stroke="rgba(255,255,255,.55)" stroke-width="1.6"/>
      <!-- foul poles -->
      <circle cx="40" cy="150" r="3" fill="#ffd34d"/><circle cx="360" cy="150" r="3" fill="#ffd34d"/>
      <!-- infield dirt skin (arc + basepaths) -->
      <path d="M200,392 L256,336 A 80 80 0 0 0 144,336 Z" fill="#7A4A2A"/>
      <path d="M200,300 L256,336 A 80 80 0 0 0 144,336 Z" fill="#7A4A2A" opacity="0"/>
      <!-- infield grass diamond -->
      <path d="M200,388 L250,338 L200,300 L150,338 Z" fill="#234c34"/>
      <!-- basepaths -->
      <path d="M200,388 L250,338 L200,300 L150,338 Z" fill="none" stroke="#8A5631" stroke-width="6"/>
      <!-- mound -->
      <circle cx="200" cy="348" r="11" fill="#8A5631"/><circle cx="200" cy="348" r="2.4" fill="rgba(255,255,255,.7)"/>
      <!-- bases -->
      <rect x="246" y="334" width="8" height="8" transform="rotate(45 250 338)" fill="#fff"/>
      <rect x="196" y="296" width="8" height="8" transform="rotate(45 200 300)" fill="#fff"/>
      <rect x="146" y="334" width="8" height="8" transform="rotate(45 150 338)" fill="#fff"/>
      <!-- home plate -->
      <path d="M195,389 l10,0 l0,4 l-5,4 l-5,-4 z" fill="#fff"/>
    </svg>
    <!-- fielder chips injected by JS -->
  </div>
  <div class="legend">
    <span><i style="background:var(--hot)"></i>Hot (L15)</span>
    <span><i style="background:var(--cold)"></i>Cold</span>
    <span><i style="background:#7a8a80"></i>Steady</span>
  </div>
  <div class="statlbl" id="statlbl">SHOWING · OPS vs RHP</div>

  <div class="order">
    <div class="lbl">Batting Order</div>
    <div id="orderList"></div>
  </div>

  <div class="foot">Pitching · Bats · Park &amp; Weather modules continue below</div>
</div>

<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>

<script>
// pos: field % (x,y). stats per split. bvp = vs Bibee. heat: hot/cold/steady. proj=platoon-uncertain.
const P = [
  {n:51,nm:'Peralta',pos:'P',x:50,y:79,heat:'steady',pitcher:true,line:'2.90 ERA · 2.71 xERA · 31% K',season:'2.90',hand:'2.71',bvp:'—'},
  {n:24,nm:'Contreras',pos:'C',x:50,y:91,heat:'hot',wrc:130,xwoba:'.372',vR:'.910',vL:'.840',bvp:{ab:11,h:4,hr:1,ops:'1.090'},form:'1.180 OPS L15'},
  {n:12,nm:'Hoskins',pos:'1B',x:64,y:76,heat:'steady',wrc:112,xwoba:'.345',vR:'.840',vL:'.910',bvp:{ab:8,h:2,hr:0,ops:'.625'},form:'.760 OPS L15'},
  {n:0,nm:'Turang',pos:'2B',x:57,y:67,heat:'cold',wrc:95,xwoba:'.300',vR:'.720',vL:'.760',bvp:{ab:6,h:1,hr:0,ops:'.500'},form:'.540 OPS L15'},
  {n:27,nm:'Adames',pos:'SS',x:43,y:67,heat:'hot',wrc:118,xwoba:'.350',vR:'.860',vL:'.900',bvp:{ab:13,h:5,hr:1,ops:'.980'},form:'1.020 OPS L15'},
  {n:3,nm:'Ortiz',pos:'3B',x:36,y:76,heat:'steady',wrc:88,xwoba:'.298',vR:'.700',vL:'.770',bvp:{ab:5,h:1,hr:0,ops:'.560'},form:'.690 OPS L15'},
  {n:5,nm:'Mitchell',pos:'LF',x:27,y:41,heat:'hot',wrc:105,xwoba:'.330',vR:'.800',vL:'.690',bvp:{ab:4,h:2,hr:0,ops:'1.000'},form:'.940 OPS L15',proj:true},
  {n:11,nm:'Chourio',pos:'CF',x:50,y:27,heat:'hot',wrc:122,xwoba:'.358',vR:'.880',vL:'.910',bvp:{ab:7,h:3,hr:1,ops:'1.140'},form:'1.060 OPS L15'},
  {n:10,nm:'Frelick',pos:'RF',x:72,y:41,heat:'cold',wrc:92,xwoba:'.305',vR:'.740',vL:'.700',bvp:{ab:9,h:2,hr:0,ops:'.560'},form:'.610 OPS L15'},
];
const ORDER = [
  [1,'Turang','2B',0],[2,'Frelick','RF',9],[3,'Chourio','CF',8],[4,'Contreras','C',1],[5,'Hoskins','1B',2],
  [6,'Yelich','DH','—'],[7,'Ortiz','3B',5],[8,'Mitchell','LF',6],[9,'Adames','SS',4],
];
const ORDER_STATS = {Turang:{h:'cold',v:'.720'},Frelick:{h:'cold',v:'.740'},Chourio:{h:'hot',v:'.880'},Contreras:{h:'hot',v:'.910'},
  Hoskins:{h:'steady',v:'.840'},Yelich:{h:'hot',v:'.930'},Ortiz:{h:'steady',v:'.700'},Mitchell:{h:'hot',v:'.800'},Adames:{h:'hot',v:'.860'}};

const heatColor = h => h==='hot'?'var(--hot)':h==='cold'?'var(--cold)':'#7a8a80';
let split='hand', state='confirmed';

function statFor(p){
  if(p.pitcher) return p[split==='season'?'season':split==='hand'?'hand':'bvp'] || '—';
  if(split==='season') return p.xwoba;
  if(split==='hand') return p.vR;          // Bibee is RHP → vs RHP
  return p.bvp.h+'-'+p.bvp.ab;             // BvP hits-AB
}
function statLabel(){
  return split==='season'?'SHOWING · xwOBA (season)':split==='hand'?'SHOWING · OPS vs RHP':'SHOWING · vs Bibee (H-AB)';
}
function render(){
  const wrap=document.getElementById('fieldwrap');
  [...wrap.querySelectorAll('.pl')].forEach(e=>e.remove());
  P.forEach(p=>{
    const el=document.createElement('div');
    el.className='pl'+(p.proj && state==='projected'?' proj':'');
    el.style.left=p.x+'%'; el.style.top=p.y+'%';
    const ptag = (p.proj && state==='projected')?'<span class="ptag">PLATOON ?</span>':'';
    el.innerHTML=`<div class="chip"><span class="flame" style="background:${heatColor(p.heat)}"></span>
      <span class="no">${p.n}</span><span class="st">${statFor(p)}</span></div>
      <div class="nm">${p.nm}</div><div class="pos">${p.pos}</div>${ptag}`;
    el.onclick=()=>openSheet(p);
    wrap.appendChild(el);
  });
  document.getElementById('statlbl').textContent=statLabel();
  // order
  document.getElementById('orderList').innerHTML=ORDER.map(o=>{
    const s=ORDER_STATS[o[1]]||{h:'steady',v:'—'};
    return `<div class="obatter"><span class="ord">${o[0]}</span><span><span class="onm">${o[1]}</span><span class="opos">${o[2]}</span></span>
      <span class="ost">${s.v}</span><span class="of" style="background:${heatColor(s.h)}"></span></div>`;
  }).join('');
}
function openSheet(p){
  if(p.pitcher) return;
  const sheet=document.getElementById('sheet');
  const tag = p.heat==='hot'?'<span class="sh-tag" style="background:rgba(232,100,60,.18);color:#E8643C">HOT · L15</span>'
            : p.heat==='cold'?'<span class="sh-tag" style="background:rgba(84,169,232,.18);color:#54A9E8">COLD · L15</span>':'';
  sheet.innerHTML=`<div class="grab"></div>
    <div class="sh-head"><div class="sh-no">${p.n}</div>
      <div><div class="sh-nm">${p.nm}</div><div class="sh-sub">Brewers · ${p.pos} · ${p.form}</div></div>${tag}</div>
    <div class="sh-sec"><div class="sh-l">The numbers</div>
      <div class="grid3">
        <div class="cell"><div class="v">${p.wrc}</div><div class="k">wRC+</div></div>
        <div class="cell"><div class="v">${p.xwoba}</div><div class="k">xwOBA</div></div>
        <div class="cell"><div class="v" style="color:${heatColor(p.heat)}">${p.form.split(' ')[0]}</div><div class="k">L15 OPS</div></div>
      </div></div>
    <div class="sh-sec"><div class="sh-l">Platoon splits</div>
      <div class="splitrow"><span class="k">vs RHP</span><span class="v">${p.vR}</span></div>
      <div class="splitrow"><span class="k">vs LHP</span><span class="v">${p.vL}</span></div></div>
    <div class="sh-sec"><div class="sh-l">vs Tanner Bibee (career)</div>
      <div class="bvp">${p.bvp.h}-for-${p.bvp.ab}${p.bvp.hr?`, <b>${p.bvp.hr} HR</b>`:''} · <b>${p.bvp.ops} OPS</b> — small sample, but the read against tonight's arm.</div></div>`;
  sheet.classList.add('show'); document.getElementById('scrim').classList.add('show');
}
function closeSheet(){document.getElementById('sheet').classList.remove('show');document.getElementById('scrim').classList.remove('show');}
document.querySelectorAll('#splits button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#splits button').forEach(x=>x.classList.remove('on'));b.classList.add('on');split=b.dataset.split;render();});
document.querySelectorAll('.toggles .t').forEach(b=>b.onclick=()=>{document.querySelectorAll('.toggles .t').forEach(x=>x.classList.remove('on'));b.classList.add('on');state=b.dataset.state;render();});
render();
</script>
</body>
</html>
