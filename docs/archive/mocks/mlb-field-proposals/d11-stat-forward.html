<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>d11 · Stat-Forward · Brewers Defense</title>
<style>
  :root{
    --navy:#0a2351;       /* Brewers navy */
    --navy2:#13315c;
    --gold:#ffc52f;       /* Brewers gold */
    --gold-dim:#caa23a;
    --grass:#2f7a3f;
    --grass-dark:#236031;
    --grass-light:#3c9a4f;
    --dirt:#b07b45;
    --dirt-dark:#9a6837;
    --ink:#06142e;
    --paper:#f4f1ea;
    --line:rgba(255,255,255,.85);
    --chip-bg:#0a2351;
    --mono:'SF Mono',ui-monospace,'Roboto Mono',Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#1a1d24;font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px 14px;}

  /* ---------- phone frame ---------- */
  .phone{
    width:430px;max-width:100%;
    background:var(--ink);
    border-radius:42px;
    padding:13px;
    box-shadow:0 40px 90px rgba(0,0,0,.55), 0 0 0 2px rgba(255,255,255,.04) inset;
    position:relative;
  }
  .screen{
    background:#070d1c;
    border-radius:31px;
    overflow:hidden;
    position:relative;
    height:898px;
    display:flex;flex-direction:column;
  }
  .notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:128px;height:30px;background:#000;border-radius:18px;z-index:60;}

  /* ---------- status / header ---------- */
  .statusbar{height:46px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 6px;color:#fff;font-size:13px;font-weight:600;z-index:10;letter-spacing:.2px;}
  .statusbar .dots{display:flex;gap:5px;align-items:center;}
  .statusbar .bar{width:3px;background:#fff;border-radius:1px;}
  .statusbar .b1{height:6px}.b2{height:9px}.b3{height:12px}.b4{height:14px}

  header.app{
    padding:8px 18px 14px;
    background:
      linear-gradient(180deg,var(--navy) 0%,var(--navy2) 100%);
    color:#fff;position:relative;
    border-bottom:2px solid var(--gold);
  }
  .matchup{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .team{display:flex;align-items:center;gap:9px;}
  .badge{
    width:38px;height:38px;border-radius:9px;display:grid;place-items:center;
    font-family:var(--mono);font-weight:800;font-size:15px;letter-spacing:-.5px;
    box-shadow:0 2px 6px rgba(0,0,0,.4);
  }
  .badge.cle{background:#0c2340;color:#e31837;border:1.5px solid #e31837;}
  .badge.mil{background:var(--gold);color:var(--navy);border:1.5px solid #fff;}
  .team .meta{line-height:1.15;}
  .team .meta b{font-size:13px;display:block;letter-spacing:.3px;}
  .team .meta span{font-size:10px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.8px;}
  .at{font-family:var(--mono);font-size:11px;color:var(--gold);opacity:.85;font-weight:700;}

  .subhead{display:flex;align-items:center;justify-content:space-between;margin-top:11px;}
  .vlabel{font-size:11px;text-transform:uppercase;letter-spacing:1.6px;color:var(--gold);font-weight:800;font-family:var(--mono);}
  .vlabel small{color:rgba(255,255,255,.55);font-weight:600;letter-spacing:.6px;display:block;margin-top:1px;}
  .oppstart{
    text-align:right;font-size:10px;color:rgba(255,255,255,.7);line-height:1.3;
  }
  .oppstart b{color:#fff;font-size:11px;}
  .oppstart .vs{color:var(--gold);font-weight:700;}

  /* ---------- legend / stat toggle ---------- */
  .legend{
    display:flex;align-items:center;gap:6px;padding:9px 16px;background:#0b1730;border-bottom:1px solid rgba(255,255,255,.06);
  }
  .legend .lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.45);font-weight:700;margin-right:2px;}
  .seg{display:flex;background:rgba(255,255,255,.06);border-radius:8px;padding:2px;gap:2px;}
  .seg button{
    border:none;background:transparent;color:rgba(255,255,255,.55);
    font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.5px;
    padding:4px 10px;border-radius:6px;cursor:pointer;transition:.15s;
  }
  .seg button.on{background:var(--gold);color:var(--navy);}
  .legend .hint{margin-left:auto;font-size:9px;color:rgba(255,255,255,.4);font-family:var(--mono);}

  /* ---------- field ---------- */
  .fieldwrap{position:relative;flex:1;overflow:hidden;background:#0a1428;}
  .field{
    position:absolute;inset:0;
  }
  /* outfield wall arc + grass */
  .grass{
    position:absolute;left:50%;top:8%;transform:translateX(-50%);
    width:128%;height:118%;
    background:
      radial-gradient(ellipse 70% 62% at 50% 92%, var(--grass-light) 0%, var(--grass) 42%, var(--grass-dark) 78%, #1c5028 100%);
    border-radius:50% 50% 0 0 / 64% 64% 0 0;
    box-shadow:inset 0 0 60px rgba(0,0,0,.35), 0 0 0 4px #e6e3d8 ;
    border:4px solid #d9d6cb;
  }
  /* mow stripes */
  .stripes{
    position:absolute;left:50%;top:8%;transform:translateX(-50%);
    width:128%;height:118%;border-radius:50% 50% 0 0 / 64% 64% 0 0;
    overflow:hidden;opacity:.16;mix-blend-mode:overlay;
    background:repeating-conic-gradient(from 270deg at 50% 92%, #fff 0deg 9deg, transparent 9deg 18deg);
  }
  .warning-track{
    position:absolute;left:50%;top:8%;transform:translateX(-50%);
    width:128%;height:118%;border-radius:50% 50% 0 0 / 64% 64% 0 0;
    border:13px solid var(--dirt);border-bottom:none;opacity:.0;
  }
  /* infield dirt diamond */
  .infield{
    position:absolute;left:50%;bottom:7%;transform:translateX(-50%) rotate(45deg);
    width:215px;height:215px;
    background:
      radial-gradient(circle at 50% 50%, var(--dirt) 0%, var(--dirt-dark) 100%);
    border-radius:14px;
    box-shadow:inset 0 0 22px rgba(0,0,0,.3);
  }
  /* infield grass cutout */
  .infield-grass{
    position:absolute;left:50%;bottom:7%;transform:translateX(-50%) rotate(45deg);
    width:150px;height:150px;
    background:radial-gradient(circle at 50% 50%, var(--grass-light), var(--grass));
    border-radius:10px;
    box-shadow:inset 0 0 16px rgba(0,0,0,.22);
  }
  /* baselines */
  .baseline{position:absolute;background:rgba(255,255,255,.9);height:3px;transform-origin:left center;z-index:2;border-radius:2px;}
  /* bases */
  .base{position:absolute;width:13px;height:13px;background:#fff;transform:translate(-50%,-50%) rotate(45deg);border-radius:2px;z-index:3;box-shadow:0 1px 3px rgba(0,0,0,.4);}
  .plate{position:absolute;width:15px;height:15px;background:#fff;transform:translate(-50%,-50%);z-index:3;
    clip-path:polygon(50% 0,100% 35%,80% 100%,20% 100%,0 35%);box-shadow:0 1px 3px rgba(0,0,0,.4);}
  .mound{position:absolute;left:50%;bottom:30%;transform:translate(-50%,50%);width:34px;height:34px;border-radius:50%;
    background:radial-gradient(circle,var(--dirt) 0%,var(--dirt-dark) 100%);box-shadow:inset 0 0 8px rgba(0,0,0,.3);z-index:2;}

  /* ---------- player chip (STAT-FORWARD) ---------- */
  .chip{
    position:absolute;transform:translate(-50%,-50%);
    width:96px;z-index:20;cursor:pointer;
    animation:pop .4s cubic-bezier(.2,1.3,.4,1) backwards;
  }
  @keyframes pop{from{opacity:0;transform:translate(-50%,-46%) scale(.7);}}
  .chip .card{
    background:linear-gradient(180deg,#0d2a57 0%,var(--chip-bg) 100%);
    border:1.5px solid rgba(255,197,47,.55);
    border-radius:11px;
    padding:5px 6px 6px;
    box-shadow:0 6px 16px rgba(0,0,0,.5), 0 0 0 3px rgba(0,0,0,.18);
    color:#fff;text-align:center;position:relative;
  }
  .chip .toprow{display:flex;align-items:center;justify-content:center;gap:4px;}
  .chip .pos{
    position:absolute;top:-7px;left:-7px;
    background:var(--gold);color:var(--navy);
    font-family:var(--mono);font-size:9px;font-weight:800;letter-spacing:.3px;
    padding:1px 5px;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.4);
  }
  .chip .num{
    font-family:var(--mono);font-size:11px;font-weight:800;color:var(--gold);
  }
  .chip .name{
    font-size:10.5px;font-weight:700;letter-spacing:.1px;line-height:1.05;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:84px;
  }
  /* the STAT block — the whole point of this direction */
  .chip .stats{
    margin-top:4px;display:flex;justify-content:center;gap:0;
    background:rgba(0,0,0,.32);border-radius:6px;overflow:hidden;
    border:1px solid rgba(255,197,47,.18);
  }
  .chip .stat{
    flex:1;padding:3px 2px 4px;position:relative;
  }
  .chip .stat + .stat{border-left:1px solid rgba(255,255,255,.1);}
  .chip .stat .k{
    display:block;font-family:var(--mono);font-size:6.5px;font-weight:700;
    color:rgba(255,197,47,.7);letter-spacing:.6px;text-transform:uppercase;
  }
  .chip .stat .v{
    display:block;font-family:var(--mono);font-size:11px;font-weight:800;color:#fff;line-height:1.1;margin-top:1px;
  }
  /* heat: highlight the hot stat */
  .chip .stat.hot .v{color:var(--gold);}
  .chip .stat.hot::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--gold);}

  /* pitcher chip is slimmer (pitching stats) */
  .chip.pitcher .stat .k{color:rgba(120,200,255,.85);}
  .chip.pitcher .card{border-color:rgba(120,200,255,.55);}
  .chip.pitcher .pos{background:#5bb0ff;color:#04223f;}
  .chip.pitcher .num{color:#9bd1ff;}

  /* ---------- batting order rail (slide-up sheet) ---------- */
  .order{
    background:linear-gradient(180deg,#0b1730 0%,#070d1c 100%);
    border-top:2px solid var(--gold);
    padding:10px 14px 16px;
    max-height:38%;overflow-y:auto;
  }
  .order h3{
    font-size:11px;text-transform:uppercase;letter-spacing:1.6px;color:var(--gold);
    font-family:var(--mono);font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:9px;
  }
  .order h3 .pill{background:rgba(255,197,47,.14);color:var(--gold);font-size:9px;padding:2px 7px;border-radius:20px;letter-spacing:.8px;margin-left:auto;}
  .lineup{display:flex;flex-direction:column;gap:5px;}
  .lrow{
    display:grid;grid-template-columns:22px 1fr auto auto;align-items:center;gap:9px;
    background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.05);
    border-radius:9px;padding:6px 9px;
  }
  .lrow .ord{
    font-family:var(--mono);font-weight:800;font-size:13px;color:var(--navy);
    background:var(--gold);width:22px;height:22px;border-radius:6px;display:grid;place-items:center;
  }
  .lrow .who b{font-size:12.5px;color:#fff;font-weight:700;}
  .lrow .who span{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.4);margin-left:5px;}
  .lrow .ppos{
    font-family:var(--mono);font-size:9.5px;font-weight:800;color:var(--gold-dim);
    background:rgba(255,197,47,.1);padding:2px 6px;border-radius:5px;letter-spacing:.4px;
  }
  .lrow .stat-mini{
    font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.7);
    text-align:right;min-width:62px;
  }
  .lrow .stat-mini b{color:var(--gold);}
  .lrow.dh{opacity:.92;}
  .lrow.dh .ppos{background:rgba(120,200,255,.12);color:#7cc0ff;}

  /* scrollbar */
  .order::-webkit-scrollbar{width:5px;}
  .order::-webkit-scrollbar-thumb{background:rgba(255,197,47,.3);border-radius:3px;}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="screen">

    <!-- status bar -->
    <div class="statusbar">
      <span>7:08</span>
      <span class="dots">
        <span style="font-size:11px">●●●</span>
        <span style="margin-left:4px;font-size:11px">5G</span>
        <span class="bar b1"></span><span class="bar b2"></span><span class="bar b3"></span><span class="bar b4"></span>
        <span style="margin-left:5px;font-size:11px">100%</span>
      </span>
    </div>

    <!-- header -->
    <header class="app">
      <div class="matchup">
        <div class="team">
          <div class="badge cle">CLE</div>
          <div class="meta"><b>Guardians</b><span>Away</span></div>
        </div>
        <div class="at">@</div>
        <div class="team">
          <div class="meta" style="text-align:right"><b>Brewers</b><span>Home · Defense</span></div>
          <div class="badge mil">MIL</div>
        </div>
      </div>

      <div class="subhead">
        <div class="vlabel">On The Field
          <small>Brewers defensive alignment</small>
        </div>
        <div class="oppstart">
          <span class="vs">AT THE PLATE →</span><br>
          <b>Tanner Bibee #28</b><br>CLE · RHP
        </div>
      </div>
    </header>

    <!-- stat toggle / legend -->
    <div class="legend">
      <span class="lbl">Stat</span>
      <div class="seg" id="seg">
        <button class="on" data-set="bat">BAT</button>
        <button data-set="ops">OPS+</button>
        <button data-set="def">DEF</button>
      </div>
      <span class="hint">tap a fielder ↓</span>
    </div>

    <!-- the field -->
    <div class="fieldwrap">
      <div class="field">
        <div class="grass"></div>
        <div class="stripes"></div>
        <div class="warning-track"></div>
        <div class="infield"></div>
        <div class="infield-grass"></div>

        <!-- bases (positioned relative to fieldwrap %) -->
        <div class="plate" style="left:50%;top:90%"></div>
        <div class="base"  style="left:65.5%;top:74%"></div> <!-- 1B -->
        <div class="base"  style="left:50%;top:60%"></div>   <!-- 2B -->
        <div class="base"  style="left:34.5%;top:74%"></div> <!-- 3B -->
        <div class="mound"></div>

        <!-- ============ FIELDERS (chips) ============ -->
        <!-- placeholders filled by JS so stat-toggle works -->
        <div class="chip pitcher" id="P"  style="left:50%;top:66%"></div>
        <div class="chip"         id="C"  style="left:50%;top:92.5%"></div>
        <div class="chip"         id="B1" style="left:72%;top:64%"></div>
        <div class="chip"         id="B2" style="left:63%;top:48%"></div>
        <div class="chip"         id="SS" style="left:37%;top:48%"></div>
        <div class="chip"         id="B3" style="left:28%;top:64%"></div>
        <div class="chip"         id="LF" style="left:22%;top:26%"></div>
        <div class="chip"         id="CF" style="left:50%;top:17%"></div>
        <div class="chip"         id="RF" style="left:78%;top:26%"></div>
      </div>
    </div>

    <!-- batting order rail -->
    <div class="order">
      <h3>Batting Order <span class="pill">vs RHP</span></h3>
      <div class="lineup" id="lineup"></div>
    </div>

  </div>
</div>

<script>
/* ---- fielder data: 3 stat sets so the BAT/OPS+/DEF toggle is real ---- */
const FIELDERS = {
  P:  {pos:'P', num:51, name:'Peralta',  pitcher:true,
        sets:{ bat:[['ERA','3.41','hot'],['WHIP','1.08',''],['K','98','']],
                ops:[['IP','71.0',''],['K/9','12.4','hot'],['BB/9','3.0','']],
                def:[['FIP','3.05','hot'],['HR/9','1.2',''],['GB%','38','']] }},
  C:  {pos:'C', num:24, name:'Contreras',
        sets:{ bat:[['AVG','.288','hot'],['HR','12',''],['RBI','41','']],
                ops:[['OBP','.371',''],['SLG','.479',''],['OPS+','132','hot']],
                def:[['CS%','24',''],['FRM','+6','hot'],['POP','1.9','']] }},
  B1: {pos:'1B',num:12, name:'Hoskins',
        sets:{ bat:[['AVG','.241',''],['HR','17','hot'],['RBI','48','']],
                ops:[['OBP','.340',''],['SLG','.461','hot'],['OPS+','118','']],
                def:[['DRS','+2',''],['FLD','.994','hot'],['SCP','3','']] }},
  B2: {pos:'2B',num:0,  name:'Turang',
        sets:{ bat:[['AVG','.262',''],['HR','6',''],['SB','24','hot']],
                ops:[['OBP','.337',''],['SLG','.388',''],['OPS+','101','']],
                def:[['DRS','+11','hot'],['OAA','+8',''],['FLD','.989','']] }},
  SS: {pos:'SS',num:27, name:'Adames',
        sets:{ bat:[['AVG','.251',''],['HR','19','hot'],['RBI','55','']],
                ops:[['OBP','.323',''],['SLG','.452','hot'],['OPS+','112','']],
                def:[['DRS','+7','hot'],['OAA','+5',''],['FLD','.971','']] }},
  B3: {pos:'3B',num:3,  name:'Ortiz',
        sets:{ bat:[['AVG','.243',''],['HR','8',''],['RBI','37','']],
                ops:[['OBP','.317',''],['SLG','.392',''],['OPS+','96','']],
                def:[['DRS','+9','hot'],['OAA','+6',''],['FLD','.965','']] }},
  LF: {pos:'LF',num:5,  name:'Mitchell',
        sets:{ bat:[['AVG','.255',''],['HR','9',''],['SB','19','hot']],
                ops:[['OBP','.338',''],['SLG','.430','hot'],['OPS+','108','']],
                def:[['DRS','+4',''],['OAA','+7','hot'],['ARM','94']] }},
  CF: {pos:'CF',num:11, name:'Chourio',
        sets:{ bat:[['AVG','.279','hot'],['HR','16',''],['RBI','52','']],
                ops:[['OBP','.341',''],['SLG','.488','hot'],['OPS+','126','']],
                def:[['DRS','+6',''],['OAA','+9','hot'],['ARM','96']] }},
  RF: {pos:'RF',num:10, name:'Frelick',
        sets:{ bat:[['AVG','.290','hot'],['HR','5',''],['RBI','35','']],
                ops:[['OBP','.357','hot'],['SLG','.401',''],['OPS+','110','']],
                def:[['DRS','+13','hot'],['OAA','+10',''],['ARM','93']] }},
};

let CURRENT = 'bat';

function renderChip(id){
  const f = FIELDERS[id];
  const stats = f.sets[CURRENT] || f.sets.bat;
  const statHTML = stats.map(s=>
    `<div class="stat ${s[2]==='hot'?'hot':''}"><span class="k">${s[0]}</span><span class="v">${s[1]}</span></div>`
  ).join('');
  document.getElementById(id).innerHTML = `
    <div class="card">
      <div class="pos">${f.pos}</div>
      <div class="toprow"><span class="num">#${f.num}</span><span class="name">${f.name}</span></div>
      <div class="stats">${statHTML}</div>
    </div>`;
}
function renderAll(){ Object.keys(FIELDERS).forEach(renderChip); }
renderAll();

/* stat toggle */
document.getElementById('seg').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  document.querySelectorAll('#seg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  CURRENT = b.dataset.set;
  renderAll();
});

/* tap a chip -> bounce */
document.querySelector('.field').addEventListener('click', e=>{
  const c = e.target.closest('.chip'); if(!c) return;
  c.style.animation='none'; void c.offsetWidth; c.style.animation='pop .35s cubic-bezier(.2,1.3,.4,1)';
});

/* ---- batting order ---- */
const ORDER = [
  {n:1, name:'Turang',    num:0,  pos:'2B', line:'.262 · 24 SB'},
  {n:2, name:'Frelick',   num:10, pos:'RF', line:'.290 · .357 OBP'},
  {n:3, name:'Chourio',   num:11, pos:'CF', line:'.279 · 16 HR'},
  {n:4, name:'Contreras', num:24, pos:'C',  line:'.288 · 12 HR'},
  {n:5, name:'Hoskins',   num:12, pos:'1B', line:'.241 · 17 HR'},
  {n:6, name:'Yelich',    num:22, pos:'DH', line:'.271 · 14 HR', dh:true},
  {n:7, name:'Ortiz',     num:3,  pos:'3B', line:'.243 · 8 HR'},
  {n:8, name:'Mitchell',  num:5,  pos:'LF', line:'.255 · 19 SB'},
  {n:9, name:'Adames',    num:27, pos:'SS', line:'.251 · 19 HR'},
];
document.getElementById('lineup').innerHTML = ORDER.map(o=>`
  <div class="lrow ${o.dh?'dh':''}">
    <div class="ord">${o.n}</div>
    <div class="who"><b>${o.name}</b><span>#${o.num}</span></div>
    <div class="ppos">${o.pos}</div>
    <div class="stat-mini">${o.line.replace(/(\.\d{3}|\d+\s?(HR|SB))/,'<b>$1</b>')}</div>
  </div>`).join('');
</script>
</body>
</html>
