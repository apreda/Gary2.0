<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC Starting XI — 6 sharp lineup mocks</title>
<style>
  :root{--bg:#1b1712;--card:#241d15;--line:rgba(220,200,160,.16);--ink:#F3ECDD;--ink2:#B6A988;--ink3:#7E7259;--gold:#D6A94A;--gold-deep:#B5862F;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1100px 520px at 50% -8%,#241d14,var(--bg));color:var(--ink);font-family:var(--sans);min-height:100vh}
  header.top{position:sticky;top:0;z-index:5;backdrop-filter:blur(8px);background:rgba(27,23,18,.9);border-bottom:1px solid var(--line);padding:18px 26px 16px}
  .kick{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;font-weight:700}
  h1{margin:6px 0 4px;font-size:24px;font-weight:800}.sub{font-size:13px;color:var(--ink2);line-height:1.5;max-width:760px}.sub b{color:var(--ink)}
  .links{margin-top:8px;font-family:var(--mono);font-size:11px;color:var(--ink3)}.links a{color:var(--gold);font-weight:700;text-decoration:none}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:22px;padding:24px 26px 60px;max-width:1180px;margin:0 auto}
  a.card{display:flex;flex-direction:column;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:.16s;box-shadow:0 8px 26px rgba(0,0,0,.32)}
  a.card:hover{transform:translateY(-3px);border-color:rgba(214,169,74,.5)}
  .chead{display:flex;align-items:baseline;gap:9px;padding:13px 15px 4px}
  .num{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--gold);background:rgba(214,169,74,.12);border:1px solid rgba(214,169,74,.3);border-radius:7px;padding:2px 7px}
  .nm{font-size:15.5px;font-weight:700}.desc{padding:3px 15px 12px;font-size:12px;color:var(--ink2);line-height:1.45;min-height:30px}
  .thumb{width:100%;height:600px;overflow:hidden;position:relative;background:#0d0b08;border-top:1px solid var(--line)}
  .scaler{position:absolute;inset:0;display:flex;justify-content:center}.scaler iframe{width:430px;height:900px;border:0;transform:scale(.82);transform-origin:top center;pointer-events:none}
  .open{font-family:var(--mono);font-size:11px;color:var(--ink3);padding:9px 15px;display:flex;justify-content:space-between;border-top:1px solid var(--line)}.open .go{color:var(--gold)}
</style>
</head>
<body>
<header class="top">
  <div class="kick">Gary · Sharp · Lineup-only</div>
  <h1>WC Starting XI — 6 sharp mocks</h1>
  <div class="sub">The anti-bubbly set: flat fills, crisp lines, the muted field with cream discs / maroon kits. Lineup-focused (before the intel-section reframe).</div>
  <div class="links"><a href="../intel/index.html">→ the 5 hand-built GAME-INTEL sections (m1–m5)</a></div>
</header>
<div class="grid" id="grid"></div>
<script>
const M=[
  ['s01','s01-disc-clean.html','Sharp Disc · Clean','Refined image-3 — cream discs, thin top strip, one read line.'],
  ['s02','s02-jersey-clean.html','Sharp Jersey · Clean','Refined image-4 — maroon kits, crisp amber 3/5 flag, no glow.'],
  ['s03','s03-disc-ink.html','Sharp Disc · Ink Chrome','Cream discs in a flat near-black broadcast frame, one gold seam.'],
  ['s04','s04-jersey-warm.html','Sharp Jersey · Warm Chrome','Maroon kits wrapped in flat Gary cream chrome.'],
  ['s05','s05-disc-minimal.html','Sharp Disc · Ultra-Minimal','Stripped to almost nothing — pitch + tiny chip + one line.'],
  ['s06','s06-jersey-readrail.html','Sharp Jersey · Read Rail','Kits + a crisp bottom read rail with mono odds, betting-forward.'],
];
const g=document.getElementById('grid');
M.forEach(m=>{const a=document.createElement('a');a.className='card';a.href=m[1];a.target='_blank';
  a.innerHTML=`<div class="chead"><span class="num">${m[0]}</span><span class="nm">${m[2]}</span></div><div class="desc">${m[3]}</div>
  <div class="thumb"><div class="scaler"><iframe loading="lazy" src="${m[1]}"></iframe></div></div>
  <div class="open"><span>sharp mock</span><span class="go">open full ↗</span></div>`;g.appendChild(a);});
</script>
</body>
</html>
