<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brewers — Starting Nine · Uniform Tokens</title>
<style>
  :root{
    --navy:#0a2351;
    --navy-2:#13284f;
    --gold:#ffc52f;
    --gold-deep:#b6862c;
    --cream:#f3ead3;
    --grass:#4f9a4a;
    --grass-2:#5aa754;
    --grass-dark:#3d7d3a;
    --dirt:#c08a4e;
    --dirt-2:#b07c43;
    --chalk:rgba(255,255,255,.85);
    --ink:#0c1a30;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    height:100%;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1c3a6e 0%, #0b1830 55%, #060d1c 100%);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;
    padding:24px 0;
  }
  .phone{
    width:430px;
    min-height:900px;
    background:linear-gradient(180deg,#0c1c38 0%, #0a1730 100%);
    border-radius:46px;
    box-shadow:0 40px 90px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.05);
    overflow:hidden;
    position:relative;
    color:#fff;
    display:flex;
    flex-direction:column;
  }
  .notch{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:150px;height:30px;background:#000;border-radius:0 0 18px 18px;z-index:50;
  }

  /* ---------- Header ---------- */
  header{
    padding:42px 22px 14px;
    background:linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);
    border-bottom:1px solid rgba(255,197,47,.25);
    position:relative;
  }
  .crumb{
    display:flex;align-items:center;gap:8px;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--gold);font-weight:700;
  }
  .crumb .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);}
  .matchup{
    display:flex;align-items:center;gap:14px;margin-top:12px;
  }
  .team{display:flex;flex-direction:column;gap:2px;flex:1;}
  .team .name{font-size:19px;font-weight:800;letter-spacing:-.2px;}
  .team .sub{font-size:11px;color:rgba(255,255,255,.55);font-weight:600;}
  .team.away{text-align:right;}
  .at{
    width:34px;height:34px;border-radius:50%;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,197,47,.4);
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:800;color:var(--gold);
    flex:none;
  }
  .ctxbar{
    margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;
  }
  .chip{
    font-size:11px;font-weight:700;
    padding:6px 10px;border-radius:999px;
    background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.12);
    color:rgba(255,255,255,.85);
    display:flex;align-items:center;gap:6px;
  }
  .chip b{color:var(--gold);font-weight:800;}

  /* ---------- Field ---------- */
  .fieldwrap{
    padding:18px 16px 8px;
  }
  .field-head{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:10px;padding:0 4px;
  }
  .field-head h2{
    font-size:13px;letter-spacing:.16em;text-transform:uppercase;
    color:#fff;font-weight:800;
  }
  .field-head .tag{
    font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--gold);font-weight:700;
    border:1px solid rgba(255,197,47,.4);border-radius:6px;padding:3px 7px;
  }
  .field{
    position:relative;
    width:100%;
    height:430px;
    border-radius:18px;
    overflow:hidden;
    background:
      radial-gradient(120% 95% at 50% 8%, var(--grass-2) 0%, var(--grass) 45%, var(--grass-dark) 100%);
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.08), 0 18px 40px rgba(0,0,0,.45);
    border:1px solid rgba(0,0,0,.3);
  }
  /* mow stripes */
  .field .stripes{position:absolute;inset:0;opacity:.16;
    background:repeating-linear-gradient(95deg, transparent 0 26px, #ffffff 26px 52px);
    mix-blend-mode:overlay;}
  /* outfield wall arc */
  .wall{
    position:absolute;top:6px;left:50%;transform:translateX(-50%);
    width:118%;height:78%;border:7px solid #16331f;
    border-bottom:none;border-radius:50% 50% 0 0 / 100% 100% 0 0;
    box-shadow:inset 0 5px 0 rgba(255,197,47,.5);
    opacity:.9;
  }
  .warning{
    position:absolute;top:6px;left:50%;transform:translateX(-50%);
    width:113%;height:75%;border:18px solid rgba(192,138,78,.35);
    border-bottom:none;border-radius:50% 50% 0 0 / 100% 100% 0 0;
  }
  /* infield dirt */
  .dirt-diamond{
    position:absolute;
    left:50%;bottom:34px;transform:translateX(-50%) rotate(45deg);
    width:200px;height:200px;
    background:linear-gradient(135deg,var(--dirt) 0%, var(--dirt-2) 100%);
    border-radius:14px;
    box-shadow:inset 0 0 0 3px rgba(255,255,255,.18);
  }
  /* infield grass inset */
  .infield-grass{
    position:absolute;
    left:50%;bottom:58px;transform:translateX(-50%) rotate(45deg);
    width:138px;height:138px;
    background:linear-gradient(135deg,var(--grass-2),var(--grass));
    border-radius:8px;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.1);
  }
  /* base lines */
  .baselines{position:absolute;left:50%;bottom:34px;transform:translateX(-50%);
    width:200px;height:200px;pointer-events:none;}
  .baselines svg{width:100%;height:100%;display:block;overflow:visible;}
  /* pitcher mound */
  .mound{
    position:absolute;left:50%;bottom:128px;transform:translateX(-50%);
    width:46px;height:46px;border-radius:50%;
    background:radial-gradient(circle at 50% 40%, #d49a5d, #b07c43);
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.2);
  }
  /* bases */
  .base{position:absolute;width:13px;height:13px;background:#fff;
    transform:rotate(45deg);box-shadow:0 1px 3px rgba(0,0,0,.4);border-radius:2px;}
  .base.second{left:50%;bottom:158px;margin-left:-6.5px;}
  .base.first{left:50%;bottom:90px;margin-left:62px;}
  .base.third{left:50%;bottom:90px;margin-left:-75px;}
  .home{position:absolute;left:50%;bottom:30px;margin-left:-9px;
    width:18px;height:18px;background:#fff;
    clip-path:polygon(50% 0,100% 35%,80% 100%,20% 100%,0 35%);
    box-shadow:0 1px 4px rgba(0,0,0,.4);}

  /* ---------- Jersey token (the star of the show) ---------- */
  .player{
    position:absolute;
    width:60px;
    transform:transl(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;
    z-index:6;
    cursor:pointer;
  }
  .jersey{
    position:relative;
    width:54px;height:50px;
    filter:drop-shadow(0 6px 8px rgba(0,0,0,.5));
    transition:transform .15s ease;
  }
  .player:hover .jersey{transform:translateY(-3px) scale(1.06);}
  .player.active .jersey{transform:translateY(-3px) scale(1.06);}
  /* the shirt shape via clip-path */
  .shirt{
    position:absolute;inset:0;
    background:linear-gradient(180deg,#fff 0%, #f4f4f4 100%);
    clip-path:polygon(
      26% 0, 74% 0,            /* collar shoulders */
      100% 16%, 88% 34%,       /* right sleeve */
      88% 100%, 12% 100%,      /* body */
      12% 34%, 0 16%           /* left sleeve */
    );
  }
  /* navy pinstripes baked in */
  .shirt::before{
    content:"";position:absolute;inset:0;
    clip-path:polygon(26% 0,74% 0,100% 16%,88% 34%,88% 100%,12% 100%,12% 34%,0 16%);
    background:repeating-linear-gradient(90deg, transparent 0 5px, rgba(10,35,81,.55) 5px 6px);
    opacity:.8;
  }
  /* gold collar/placket */
  .shirt::after{
    content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:18px;height:11px;
    background:var(--gold);
    clip-path:polygon(0 0,100% 0,75% 100%,25% 100%);
  }
  .num{
    position:absolute;left:50%;top:46%;transform:translateX(-50%);
    font-size:18px;font-weight:900;color:var(--navy);
    text-shadow:0 1px 0 rgba(255,255,255,.7);
    letter-spacing:-1px;
    z-index:2;
  }
  /* the position badge floats top-left on the jersey */
  .posbadge{
    position:absolute;top:-6px;left:-7px;
    background:var(--navy);color:var(--gold);
    font-size:9px;font-weight:900;letter-spacing:.4px;
    padding:2px 5px;border-radius:6px;
    border:1.5px solid var(--gold);
    z-index:3;
    box-shadow:0 2px 4px rgba(0,0,0,.4);
  }
  .pname{
    margin-top:4px;
    font-size:10.5px;font-weight:800;color:#fff;
    text-align:center;line-height:1.05;
    text-shadow:0 1px 3px rgba(0,0,0,.85);
    background:rgba(10,26,48,.55);
    padding:2px 6px;border-radius:6px;
    backdrop-filter:blur(2px);
    border:1px solid rgba(255,255,255,.08);
    white-space:nowrap;
  }

  /* ---------- Batting order rail ---------- */
  .order{
    padding:6px 16px 22px;
  }
  .order h3{
    font-size:12px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--gold);font-weight:800;margin:8px 4px 12px;
    display:flex;align-items:center;gap:8px;
  }
  .order h3 .line{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,197,47,.5),transparent);}
  .lineup{
    display:grid;grid-template-columns:1fr 1fr;gap:8px;
  }
  .lrow{
    display:flex;align-items:center;gap:10px;
    background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    padding:8px 10px;
    transition:border-color .15s ease, background .15s ease;
  }
  .lrow:hover, .lrow.active{
    border-color:rgba(255,197,47,.6);
    background:linear-gradient(180deg,rgba(255,197,47,.12),rgba(255,197,47,.03));
  }
  .ord{
    width:24px;height:24px;border-radius:7px;flex:none;
    background:var(--navy);border:1px solid var(--gold);
    color:var(--gold);font-weight:900;font-size:12px;
    display:flex;align-items:center;justify-content:center;
  }
  .lrow .info{display:flex;flex-direction:column;gap:1px;min-width:0;}
  .lrow .pn{font-size:12.5px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lrow .meta{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);}
  .lrow .meta b{color:var(--gold);}

  /* mini jersey swatch in rail */
  .mini{
    width:18px;height:16px;flex:none;position:relative;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.4));
  }
  .mini .s{position:absolute;inset:0;background:#fff;
    clip-path:polygon(26% 0,74% 0,100% 16%,88% 34%,88% 100%,12% 100%,12% 34%,0 16%);}
  .mini .s::before{content:"";position:absolute;inset:0;
    clip-path:polygon(26% 0,74% 0,100% 16%,88% 34%,88% 100%,12% 100%,12% 34%,0 16%);
    background:repeating-linear-gradient(90deg,transparent 0 2px,rgba(10,35,81,.6) 2px 3px);}

  /* footer */
  footer{
    margin-top:auto;
    padding:14px 18px 26px;
    background:linear-gradient(180deg,transparent, rgba(10,35,81,.5));
    display:flex;align-items:center;justify-content:space-between;
    border-top:1px solid rgba(255,255,255,.06);
  }
  footer .note{font-size:10.5px;color:rgba(255,255,255,.5);font-weight:600;}
  footer .pill{
    font-size:11px;font-weight:800;color:var(--ink);
    background:var(--gold);padding:7px 14px;border-radius:999px;
    box-shadow:0 4px 12px rgba(255,197,47,.3);
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>

    <!-- HEADER -->
    <header>
      <div class="crumb"><span class="dot"></span> Starting Lineups · Today 7:10 PM</div>
      <div class="matchup">
        <div class="team away">
          <div class="name">Guardians</div>
          <div class="sub">Cleveland · 38–31</div>
        </div>
        <div class="at">@</div>
        <div class="team">
          <div class="name">Brewers</div>
          <div class="sub">Milwaukee · 41–28 · HOME</div>
        </div>
      </div>
      <div class="ctxbar">
        <span class="chip">SP <b>Freddy Peralta #51</b></span>
        <span class="chip">vs <b>Tanner Bibee #28</b> RHP</span>
        <span class="chip">American Family Field</span>
      </div>
    </header>

    <!-- FIELD -->
    <div class="fieldwrap">
      <div class="field-head">
        <h2>Defensive Alignment</h2>
        <span class="tag">Brewers · Home Whites</span>
      </div>

      <div class="field" id="field">
        <div class="stripes"></div>
        <div class="warning"></div>
        <div class="wall"></div>
        <div class="infield-grass"></div>
        <div class="dirt-diamond"></div>

        <div class="baselines">
          <svg viewBox="0 0 200 200">
            <!-- foul lines from home (bottom center) to corners -->
            <line x1="100" y1="200" x2="170" y2="42" stroke="rgba(255,255,255,.85)" stroke-width="2.5"/>
            <line x1="100" y1="200" x2="30" y2="42" stroke="rgba(255,255,255,.85)" stroke-width="2.5"/>
          </svg>
        </div>

        <div class="mound"></div>
        <div class="base second"></div>
        <div class="base first"></div>
        <div class="base third"></div>
        <div class="home"></div>

        <!-- PLAYERS placed via JS -->
      </div>
    </div>

    <!-- BATTING ORDER -->
    <div class="order">
      <h3>Batting Order <span class="line"></span></h3>
      <div class="lineup" id="lineup"></div>
    </div>

    <footer>
      <div class="note">Tap a jersey to highlight in the order</div>
      <div class="pill">Gary's Pick →</div>
    </footer>
  </div>

<script>
  // Fielder positions: percentages within the 100% x 430px field box.
  // x = left %, y = top %.
  const fielders = [
    { pos:"CF", num:11, name:"Chourio",   x:50, y:14 },
    { pos:"LF", num:5,  name:"Mitchell",  x:23, y:23 },
    { pos:"RF", num:10, name:"Frelick",   x:77, y:23 },
    { pos:"SS", num:27, name:"Adames",    x:38, y:48 },
    { pos:"2B", num:0,  name:"Turang",    x:62, y:48 },
    { pos:"3B", num:3,  name:"Ortiz",     x:24, y:62 },
    { pos:"1B", num:12, name:"Hoskins",   x:76, y:62 },
    { pos:"P",  num:51, name:"Peralta",   x:50, y:64 },
    { pos:"C",  num:24, name:"Contreras", x:50, y:88 },
  ];

  const lineupOrder = [
    { ord:1, name:"Turang",    pos:"2B", num:0  },
    { ord:2, name:"Frelick",   pos:"RF", num:10 },
    { ord:3, name:"Chourio",   pos:"CF", num:11 },
    { ord:4, name:"Contreras", pos:"C",  num:24 },
    { ord:5, name:"Hoskins",   pos:"1B", num:12 },
    { ord:6, name:"Yelich",    pos:"DH", num:22 },
    { ord:7, name:"Ortiz",     pos:"3B", num:3  },
    { ord:8, name:"Mitchell",  pos:"LF", num:5  },
    { ord:9, name:"Adames",    pos:"SS", num:27 },
  ];

  const field = document.getElementById("field");
  fielders.forEach(p=>{
    const el = document.createElement("div");
    el.className = "player";
    el.dataset.name = p.name;
    el.style.left = p.x + "%";
    el.style.top  = p.y + "%";
    el.style.transform = "translate(-50%,-50%)";
    el.innerHTML = `
      <div class="jersey">
        <div class="posbadge">${p.pos}</div>
        <div class="shirt"></div>
        <div class="num">${p.num}</div>
      </div>
      <div class="pname">${p.name}</div>
    `;
    el.addEventListener("click", ()=>highlight(p.name, el));
    field.appendChild(el);
  });

  const lineupEl = document.getElementById("lineup");
  lineupOrder.forEach(p=>{
    const row = document.createElement("div");
    row.className = "lrow";
    row.dataset.name = p.name;
    row.innerHTML = `
      <div class="ord">${p.ord}</div>
      <div class="mini"><div class="s"></div></div>
      <div class="info">
        <div class="pn">${p.name}</div>
        <div class="meta"><b>${p.pos}</b> · #${p.num}</div>
      </div>
    `;
    row.addEventListener("click", ()=>highlight(p.name, row));
    lineupEl.appendChild(row);
  });

  function highlight(name, src){
    document.querySelectorAll(".player").forEach(e=>e.classList.toggle("active", e.dataset.name===name));
    document.querySelectorAll(".lrow").forEach(e=>e.classList.toggle("active", e.dataset.name===name));
  }
</script>
</body>
</html>
